# metamodel_version: 1.7.0
# version: 1.0.0
enum ConsentMechanism
  {
    opt_in
    opt_out
    implied
  }

enum PIIFlowRole
  {
    pii_provider
    pii_recipient
    not_involved
  }

enum PIIProcessingOperation
  {
    collection
    storage
    alteration
    retrieval
    consultation
    disclosure
    anonymization
    pseudonymization
    dissemination
    deletion
    destruction
  }

enum PIISensitivityCategory
  {
    standard
    sensitive
  }

enum PrivacyControlType
  {
    organizational
    physical
    technical
    legal_contractual
  }

enum PrivacyPrinciple
  {
    consent_and_choice
    purpose_legitimacy_and_specification
    collection_limitation
    data_minimization
    use_retention_and_disclosure_limitation
    accuracy_and_quality
    openness_transparency_and_notice
    individual_participation_and_access
    accountability
    information_security
    privacy_compliance
  }

enum PrivacyRiskLevel
  {
    low
    medium
    high
    very_high
  }

enum SafeguardingRequirementFactor
  {
    legal_and_regulatory
    contractual
    business
    other
  }

type ConsentRecord
  {
    id: String!
    name: String!
    description: String
    createdDate: String
    modifiedDate: String
    principalRef: String
    consentDate: String
    consentMechanism: ConsentMechanism
    processingPurposesConsented: [String]
    piiCategoriesConsented: [String]
    withdrawalDate: String
    consentStatus: String
    consentEvidenceRef: String
  }

interface NamedEntity
  {
    id: String!
    name: String!
    description: String
    createdDate: String
    modifiedDate: String
  }

type PersonallyIdentifiableInformation
  {
    id: String!
    name: String!
    description: String
    createdDate: String
    modifiedDate: String
    piiCategory: [String]
    sensitivityLevel: PIISensitivityCategory
    identifierType: String
    isPseudonymized: Boolean
    isAnonymized: Boolean
    linkabilityRisk: String
    applicableToPrincipal: String
    retentionSchedule: String
    processingOperations: [PIIProcessingOperation]
  }

type PIIController
  {
    id: String!
    name: String!
    description: String
    createdDate: String
    modifiedDate: String
    contactInformation: String
    jurisdictions: [String]
    processingPurposes: [String]
    legalBases: [String]
    appointedProcessors: [PIIProcessor]
    privacyPolicyRef: PrivacyPolicy
    dataProtectionOfficer: String
  }

type PIIFlowScenario
  {
    id: String!
    name: String!
    description: String
    createdDate: String
    modifiedDate: String
    scenarioLabel: String
    piiPrincipalRole: PIIFlowRole
    piiControllerRole: PIIFlowRole
    piiProcessorRole: PIIFlowRole
    thirdPartyRole: PIIFlowRole
    scenarioDescription: String
    legalControlRetention: String
  }

type PIIPrincipal
  {
    id: String!
    name: String!
    description: String
    createdDate: String
    modifiedDate: String
    contactInformation: String
    jurisdictions: [String]
    privacyPreferences: [PrivacyPreference]
    consentRecords: [ConsentRecord]
  }

type PIIProcessingActivity
  {
    id: String!
    name: String!
    description: String
    createdDate: String
    modifiedDate: String
    processingPurpose: String
    legalBasis: String
    operationsPerformed: [PIIProcessingOperation]
    piiCategoriesProcessed: [String]
    sensitivityLevelsInvolved: [PIISensitivityCategory]
    controllerRef: PIIController
    processorRef: PIIProcessor
    dataFlows: [PIIFlowScenario]
    retentionPeriod: DurationType
    privacyControlsApplied: [PrivacyControl]
    crossBorderTransfer: Boolean
    transferSafeguards: [String]
  }

type PIIProcessor
  {
    id: String!
    name: String!
    description: String
    createdDate: String
    modifiedDate: String
    contactInformation: String
    jurisdictions: [String]
    instructingController: PIIController
    processingAgreementRef: String
    subProcessors: [PIIProcessor]
  }

type PrivacyBreach
  {
    id: String!
    name: String!
    description: String
    createdDate: String
    modifiedDate: String
    breachDatetime: String
    discoveryDatetime: String
    breachDescription: String
    affectedPiiCategories: [String]
    affectedPrincipalsCount: PositiveIntegerType
    violatedRequirements: [PrivacySafeguardingRequirement]
    breachSeverity: PrivacyRiskLevel
    immediateActions: [String]
    notificationRequired: Boolean
    notificationsMade: [String]
    remediationActions: [String]
    lessonsLearned: String
    closureDatetime: String
  }

type PrivacyControl
  {
    id: String!
    name: String!
    description: String
    createdDate: String
    modifiedDate: String
    controlType: PrivacyControlType
    controlObjective: String
    addressedPrinciples: [PrivacyPrinciple]
    implementationDescription: String
    responsibleActor: String
    implementationStatus: String
    effectivenessEvidence: [String]
    relatedSafeguardingRequirements: [PrivacySafeguardingRequirement]
    isPet: Boolean
  }

type PrivacyFramework
  {
    id: String!
    name: String!
    description: String
    createdDate: String
    modifiedDate: String
    organizationName: String
    ictSystemDescription: String
    applicableJurisdictions: [String]
    piiControllers: [PIIController]
    piiProcessors: [PIIProcessor]
    thirdParties: [ThirdParty]
    piiPrincipalsDescription: String
    privacyPolicy: PrivacyPolicy
    privacyControls: [PrivacyControl]
    safeguardingRequirements: [PrivacySafeguardingRequirement]
    privacyRisks: [PrivacyRisk]
    privacyImpactAssessments: [PrivacyImpactAssessment]
    privacyBreaches: [PrivacyBreach]
    piiProcessingActivities: [PIIProcessingActivity]
    principleImplementations: [PrivacyPrincipleImplementation]
  }

type PrivacyImpactAssessment
  {
    id: String!
    name: String!
    description: String
    createdDate: String
    modifiedDate: String
    assessmentScope: String
    assessmentDate: String
    assessor: String
    processingActivitiesAssessed: [PIIProcessingActivity]
    risksIdentified: [PrivacyRisk]
    risksTreated: [PrivacyRisk]
    residualRisksAccepted: [PrivacyRisk]
    assessmentOutcome: String
    nextAssessmentDate: String
    consultationRecords: [String]
  }

type PrivacyPolicy
  {
    id: String!
    name: String!
    description: String
    createdDate: String
    modifiedDate: String
    policyVersion: String
    effectiveDate: String
    policyScope: String
    processingPurposesCovered: [String]
    piiCategoriesCovered: [String]
    dataRetentionStatement: String
    piiPrincipalRights: [String]
    contactForInquiries: String
    lastReviewDate: String
    isExternalNotice: Boolean
    applicablePrinciples: [PrivacyPrinciple]
  }

type PrivacyPreference
  {
    id: String!
    name: String!
    description: String
    createdDate: String
    modifiedDate: String
    principalRef: String
    preferenceScope: String
    anonymityPreference: Boolean
    pseudonymityPreference: Boolean
    processingRestrictionPreferences: [PIIProcessingOperation]
    disclosureRestrictionPreferences: [String]
    preferenceRecordedDate: String
  }

type PrivacyPrincipleImplementation
  {
    id: String!
    name: String!
    description: String
    createdDate: String
    modifiedDate: String
    principle: PrivacyPrinciple!
    implementationMeasures: [String]
    applicableControlsRef: [PrivacyControl]
    evidenceOfAdherence: [String]
    gapsIdentified: [String]
    improvementActions: [String]
    lastAssessedDate: String
  }

type PrivacyRisk
  {
    id: String!
    name: String!
    description: String
    createdDate: String
    modifiedDate: String
    riskSource: String
    affectedPiiCategories: [String]
    affectedPrincipalsDescription: String
    riskLikelihood: String
    riskImpactDescription: String
    inherentRiskLevel: PrivacyRiskLevel
    residualRiskLevel: PrivacyRiskLevel
    mitigatingControls: [PrivacyControl]
    riskOwner: String
  }

type PrivacySafeguardingRequirement
  {
    id: String!
    name: String!
    description: String
    createdDate: String
    modifiedDate: String
    requirementFactor: SafeguardingRequirementFactor
    requirementText: String
    sourceReference: String
    applicableToActors: [String]
    relatedControls: [PrivacyControl]
    priority: String
  }

interface PrivacyStakeholder
  {
    id: String!
    name: String!
    description: String
    createdDate: String
    modifiedDate: String
    contactInformation: String
    jurisdictions: [String]
  }

type ThirdParty
  {
    id: String!
    name: String!
    description: String
    createdDate: String
    modifiedDate: String
    contactInformation: String
    jurisdictions: [String]
    receivingPurpose: String
    transferBasis: String
  }
