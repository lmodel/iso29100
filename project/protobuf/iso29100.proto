 syntax="proto3";
 package
// metamodel_version: 1.7.0
// version: 1.0.0
// Schema class documenting a PII principal's agreement to processing of their PII for stated purposes. Records the consent mechanism used, scope, current status, and withdrawal date — supporting auditability of the consent and choice privacy principle.
message ConsentRecord
 {
  uriorcurie id = 0
  string name = 0
  string description = 0
  date createdDate = 0
  date modifiedDate = 0
  string principalRef = 0
  datetime consentDate = 0
  consentMechanism consentMechanism = 0
 repeated  string processingPurposesConsented = 0
 repeated  string piiCategoriesConsented = 0
  datetime withdrawalDate = 0
  string consentStatus = 0
  string consentEvidenceRef = 0
 }
// Schema class representing a data element or attribute set that can be linked back to a natural person — either directly or through combination with other attributes. Captures sensitivity classification, identifier type, pseudonymization status, retention schedule, and processing operations applicable to the data.
message PersonallyIdentifiableInformation
 {
  uriorcurie id = 0
  string name = 0
  string description = 0
  date createdDate = 0
  date modifiedDate = 0
 repeated  string piiCategory = 0
  pIISensitivityCategory sensitivityLevel = 0
  string identifierType = 0
  boolean isPseudonymized = 0
  boolean isAnonymized = 0
  string linkabilityRisk = 0
  string applicableToPrincipal = 0
  string retentionSchedule = 0
 repeated  pIIProcessingOperation processingOperations = 0
 }
// Schema class for an organization or individual that determines why and how PII is processed. Captures appointed processors, legal bases relied upon, privacy policy reference, and data protection officer details. Bears ultimate accountability for privacy principle adherence.
message PIIController
 {
  uriorcurie id = 0
  string name = 0
  string description = 0
  date createdDate = 0
  date modifiedDate = 0
  string contactInformation = 0
 repeated  string jurisdictions = 0
 repeated  string processingPurposes = 0
 repeated  string legalBases = 0
 repeated  pIIProcessor appointedProcessors = 0
  privacyPolicy privacyPolicyRef = 0
  string dataProtectionOfficer = 0
 }
// A documented scenario describing the flow of PII among privacy framework actors (PII principal, PII controller, PII processor, and third party), as illustrated in Table 1 of Clause 5.3.
message PIIFlowScenario
 {
  uriorcurie id = 0
  string name = 0
  string description = 0
  date createdDate = 0
  date modifiedDate = 0
  string scenarioLabel = 0
  pIIFlowRole piiPrincipalRole = 0
  pIIFlowRole piiControllerRole = 0
  pIIFlowRole piiProcessorRole = 0
  pIIFlowRole thirdPartyRole = 0
  string scenarioDescription = 0
  string legalControlRetention = 0
 }
// Schema class for a data subject — the individual to whom PII belongs. Links consent records and privacy preferences to the natural person whose data is being processed, enabling subject-centric data models.
message PIIPrincipal
 {
  uriorcurie id = 0
  string name = 0
  string description = 0
  date createdDate = 0
  date modifiedDate = 0
  string contactInformation = 0
 repeated  string jurisdictions = 0
 repeated  privacyPreference privacyPreferences = 0
 repeated  consentRecord consentRecords = 0
 }
// Schema class documenting a PII processing operation: its purpose, legal basis, operation types performed, categories of PII involved, responsible actors, applied controls, retention period, and any cross-border transfer safeguards.
message PIIProcessingActivity
 {
  uriorcurie id = 0
  string name = 0
  string description = 0
  date createdDate = 0
  date modifiedDate = 0
  string processingPurpose = 0
  string legalBasis = 0
 repeated  pIIProcessingOperation operationsPerformed = 0
 repeated  string piiCategoriesProcessed = 0
 repeated  pIISensitivityCategory sensitivityLevelsInvolved = 0
  pIIController controllerRef = 0
  pIIProcessor processorRef = 0
 repeated  pIIFlowScenario dataFlows = 0
  durationType retentionPeriod = 0
 repeated  privacyControl privacyControlsApplied = 0
  boolean crossBorderTransfer = 0
 repeated  string transferSafeguards = 0
 }
// Schema class for an organization engaged to process PII under a PII controller's instructions. Records the instructing controller, data processing agreement reference, and any sub-processors engaged on the controller's behalf.
message PIIProcessor
 {
  uriorcurie id = 0
  string name = 0
  string description = 0
  date createdDate = 0
  date modifiedDate = 0
  string contactInformation = 0
 repeated  string jurisdictions = 0
  pIIController instructingController = 0
  string processingAgreementRef = 0
 repeated  pIIProcessor subProcessors = 0
 }
// Schema class for a recorded incident in which PII was processed in a manner that violates applicable privacy safeguarding requirements. Tracks breach details, affected PII categories, notification obligations, remediation actions, and lessons learned.
message PrivacyBreach
 {
  uriorcurie id = 0
  string name = 0
  string description = 0
  date createdDate = 0
  date modifiedDate = 0
  datetime breachDatetime = 0
  datetime discoveryDatetime = 0
  string breachDescription = 0
 repeated  string affectedPiiCategories = 0
  positiveIntegerType affectedPrincipalsCount = 0
 repeated  privacySafeguardingRequirement violatedRequirements = 0
  privacyRiskLevel breachSeverity = 0
 repeated  string immediateActions = 0
  boolean notificationRequired = 0
 repeated  string notificationsMade = 0
 repeated  string remediationActions = 0
  string lessonsLearned = 0
  datetime closureDatetime = 0
 }
// Schema class for a protective measure that manages privacy risks within the framework. Can be organizational, physical, technical (including Privacy Enhancing Technologies), or legal-contractual in nature; linked to the principles and safeguarding requirements it addresses.
message PrivacyControl
 {
  uriorcurie id = 0
  string name = 0
  string description = 0
  date createdDate = 0
  date modifiedDate = 0
  privacyControlType controlType = 0
  string controlObjective = 0
 repeated  privacyPrinciple addressedPrinciples = 0
  string implementationDescription = 0
  string responsibleActor = 0
  string implementationStatus = 0
 repeated  string effectivenessEvidence = 0
 repeated  privacySafeguardingRequirement relatedSafeguardingRequirements = 0
  boolean isPet = 0
 }
// Top-level container representing an organization's privacy framework for protecting PII within ICT systems.
message PrivacyFramework
 {
  uriorcurie id = 0
  string name = 0
  string description = 0
  date createdDate = 0
  date modifiedDate = 0
  string organizationName = 0
  string ictSystemDescription = 0
 repeated  string applicableJurisdictions = 0
 repeated  pIIController piiControllers = 0
 repeated  pIIProcessor piiProcessors = 0
 repeated  thirdParty thirdParties = 0
  string piiPrincipalsDescription = 0
  privacyPolicy privacyPolicy = 0
 repeated  privacyControl privacyControls = 0
 repeated  privacySafeguardingRequirement safeguardingRequirements = 0
 repeated  privacyRisk privacyRisks = 0
 repeated  privacyImpactAssessment privacyImpactAssessments = 0
 repeated  privacyBreach privacyBreaches = 0
 repeated  pIIProcessingActivity piiProcessingActivities = 0
 repeated  privacyPrincipleImplementation principleImplementations = 0
 }
// Schema class for a structured evaluation of the privacy implications of a processing activity or ICT system. Records assessment scope, identified and treated risks, accepted residual risks, stakeholder consultation records, and overall assessment outcome.
message PrivacyImpactAssessment
 {
  uriorcurie id = 0
  string name = 0
  string description = 0
  date createdDate = 0
  date modifiedDate = 0
  string assessmentScope = 0
  date assessmentDate = 0
  string assessor = 0
 repeated  pIIProcessingActivity processingActivitiesAssessed = 0
 repeated  privacyRisk risksIdentified = 0
 repeated  privacyRisk risksTreated = 0
 repeated  privacyRisk residualRisksAccepted = 0
  string assessmentOutcome = 0
  date nextAssessmentDate = 0
 repeated  string consultationRecords = 0
 }
// Schema class for a governing document expressing an organization's intentions and commitments for PII processing. Covers both the internal policy document and any external privacy notice made available to PII principals (referred to as a notice in this framework).
message PrivacyPolicy
 {
  uriorcurie id = 0
  string name = 0
  string description = 0
  date createdDate = 0
  date modifiedDate = 0
  string policyVersion = 0
  date effectiveDate = 0
  string policyScope = 0
 repeated  string processingPurposesCovered = 0
 repeated  string piiCategoriesCovered = 0
  string dataRetentionStatement = 0
 repeated  string piiPrincipalRights = 0
  string contactForInquiries = 0
  date lastReviewDate = 0
  boolean isExternalNotice = 0
 repeated  privacyPrinciple applicablePrinciples = 0
 }
// Schema class capturing a PII principal's processing choices for a particular purpose scope: preferences for anonymity or pseudonymity, restrictions on specific processing operations, and restrictions on disclosure to named or categorized parties.
message PrivacyPreference
 {
  uriorcurie id = 0
  string name = 0
  string description = 0
  date createdDate = 0
  date modifiedDate = 0
  string principalRef = 0
  string preferenceScope = 0
  boolean anonymityPreference = 0
  boolean pseudonymityPreference = 0
 repeated  pIIProcessingOperation processingRestrictionPreferences = 0
 repeated  string disclosureRestrictionPreferences = 0
  date preferenceRecordedDate = 0
 }
// Documentation of how a specific privacy principle from Clause 6 has been implemented within the organization's privacy framework, including measures taken and evidence of adherence.
message PrivacyPrincipleImplementation
 {
  uriorcurie id = 0
  string name = 0
  string description = 0
  date createdDate = 0
  date modifiedDate = 0
  privacyPrinciple principle = 0
 repeated  string implementationMeasures = 0
 repeated  privacyControl applicableControlsRef = 0
 repeated  string evidenceOfAdherence = 0
 repeated  string gapsIdentified = 0
 repeated  string improvementActions = 0
  date lastAssessedDate = 0
 }
// Schema class representing a potential adverse outcome for PII principals from a PII processing activity. Captures the risk source, likelihood and impact assessments, inherent and residual risk levels, and links to mitigating controls and accountable risk owner.
message PrivacyRisk
 {
  uriorcurie id = 0
  string name = 0
  string description = 0
  date createdDate = 0
  date modifiedDate = 0
  string riskSource = 0
 repeated  string affectedPiiCategories = 0
  string affectedPrincipalsDescription = 0
  string riskLikelihood = 0
  string riskImpactDescription = 0
  privacyRiskLevel inherentRiskLevel = 0
  privacyRiskLevel residualRiskLevel = 0
 repeated  privacyControl mitigatingControls = 0
  string riskOwner = 0
 }
// Schema class for an applicable requirement that drives an organization's PII processing controls. Requirements are identified through the privacy risk management process and arise from legal/regulatory, contractual, business, or other influencing factors.
message PrivacySafeguardingRequirement
 {
  uriorcurie id = 0
  string name = 0
  string description = 0
  date createdDate = 0
  date modifiedDate = 0
  safeguardingRequirementFactor requirementFactor = 0
  string requirementText = 0
  string sourceReference = 0
 repeated  string applicableToActors = 0
 repeated  privacyControl relatedControls = 0
  string priority = 0
 }
// Schema class for an external entity that receives PII outside the PII processor relationship — i.e., as a recipient that typically becomes a PII controller in its own right. Captures the receiving purpose and the legal basis for the transfer.
message ThirdParty
 {
  uriorcurie id = 0
  string name = 0
  string description = 0
  date createdDate = 0
  date modifiedDate = 0
  string contactInformation = 0
 repeated  string jurisdictions = 0
  string receivingPurpose = 0
  string transferBasis = 0
 }
