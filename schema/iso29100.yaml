classes:
  NamedEntity:
    name: NamedEntity
    definition_uri: https://w3id.org/lmodel/iso29100/NamedEntity
    description: Abstract base class for all entities with a unique identifier, name,
      and description. Provides common identification and documentation slots.
    comments:
    - All concrete classes should inherit from this or a subclass
    - Ensures consistent identification across the schema
    from_schema: https://w3id.org/lmodel/iso29100
    abstract: true
    slots:
    - NamedEntity_id
    - name
    - description
    - created_date
    - modified_date
    slot_usage:
      id:
        name: id
        description: Unique identifier for this entity instance.
        identifier: true
        required: true
    class_uri: iso29100:NamedEntity
  PrivacyFramework:
    name: PrivacyFramework
    definition_uri: https://w3id.org/lmodel/iso29100/PrivacyFramework
    annotations:
      iso29100_clause:
        tag: iso29100_clause
        value: '5.1'
    description: Top-level container representing an organization's privacy framework
      for protecting PII within ICT systems.
    comments:
    - Root entity for any ISO 29100 conformance dataset
    - Aggregates all privacy framework components and their relationships
    - 'Reference: ISO/IEC 29100:2024 Clause 5.1. ISO/IEC standards text is copyright
      ISO - not reproduced here.'
    in_subset:
    - privacy_framework_core
    from_schema: https://w3id.org/lmodel/iso29100
    related_mappings:
    - iso27001:InformationSecurityManagementSystem
    is_a: NamedEntity
    slots:
    - NamedEntity_id
    - name
    - description
    - created_date
    - modified_date
    - organization_name
    - ict_system_description
    - applicable_jurisdictions
    - pii_controllers
    - pii_processors
    - third_parties
    - pii_principals_description
    - privacy_policy
    - privacy_controls
    - safeguarding_requirements
    - privacy_risks
    - privacy_impact_assessments
    - privacy_breaches
    - pii_processing_activities
    - principle_implementations
    class_uri: iso29100:PrivacyFramework
    tree_root: true
  PrivacyStakeholder:
    name: PrivacyStakeholder
    definition_uri: https://w3id.org/lmodel/iso29100/PrivacyStakeholder
    annotations:
      iso29100_clause:
        tag: iso29100_clause
        value: '3.20'
    description: 'Schema base class for the four actor types recognized by the privacy
      framework: PII principals, PII controllers, PII processors, and third parties.
      Provides shared contact and jurisdictional attributes common to all stakeholder
      roles.'
    comments:
    - 'Reference: ISO/IEC 29100:2024 Clause 3.20. ISO/IEC standards text is copyright
      ISO - not reproduced here.'
    in_subset:
    - privacy_framework_core
    from_schema: https://w3id.org/lmodel/iso29100
    exact_mappings:
    - dpv:Entity
    related_mappings:
    - iso27001:InterestedParty
    is_a: NamedEntity
    abstract: true
    slots:
    - NamedEntity_id
    - name
    - description
    - created_date
    - modified_date
    - contact_information
    - jurisdictions
    class_uri: iso29100:PrivacyStakeholder
  PIIPrincipal:
    name: PIIPrincipal
    definition_uri: https://w3id.org/lmodel/iso29100/PIIPrincipal
    annotations:
      iso29100_clause:
        tag: iso29100_clause
        value: '3.9'
    description: "Schema class for a data subject \u2014 the individual to whom PII\
      \ belongs. Links consent records and privacy preferences to the natural person\
      \ whose data is being processed, enabling subject-centric data models."
    comments:
    - A PII principal may be identified directly or indirectly through a combination
      of attributes
    - 'Reference: ISO/IEC 29100:2024 Clause 3.9 and 5.2.2. ISO/IEC standards text
      is copyright ISO - not reproduced here.'
    in_subset:
    - privacy_framework_core
    from_schema: https://w3id.org/lmodel/iso29100
    exact_mappings:
    - dpv:DataSubject
    narrow_mappings:
    - schema:Person
    is_a: PrivacyStakeholder
    slots:
    - NamedEntity_id
    - name
    - description
    - created_date
    - modified_date
    - contact_information
    - jurisdictions
    - privacy_preferences
    - consent_records
    class_uri: iso29100:PIIPrincipal
  PIIController:
    name: PIIController
    definition_uri: https://w3id.org/lmodel/iso29100/PIIController
    annotations:
      iso29100_clause:
        tag: iso29100_clause
        value: '3.8'
    description: Schema class for an organization or individual that determines why
      and how PII is processed. Captures appointed processors, legal bases relied
      upon, privacy policy reference, and data protection officer details. Bears ultimate
      accountability for privacy principle adherence.
    comments:
    - May appoint PII processors to process PII on its behalf while retaining responsibility
    - More than one PII controller may exist for the same PII set
    - 'Reference: ISO/IEC 29100:2024 Clause 3.8 and 5.2.3. ISO/IEC standards text
      is copyright ISO - not reproduced here.'
    in_subset:
    - privacy_framework_core
    from_schema: https://w3id.org/lmodel/iso29100
    exact_mappings:
    - dpv:DataController
    related_mappings:
    - schema:Organization
    is_a: PrivacyStakeholder
    slots:
    - NamedEntity_id
    - name
    - description
    - created_date
    - modified_date
    - contact_information
    - jurisdictions
    - processing_purposes
    - legal_bases
    - appointed_processors
    - privacy_policy_ref
    - data_protection_officer
    class_uri: iso29100:PIIController
  PIIProcessor:
    name: PIIProcessor
    definition_uri: https://w3id.org/lmodel/iso29100/PIIProcessor
    annotations:
      iso29100_clause:
        tag: iso29100_clause
        value: '3.10'
    description: Schema class for an organization engaged to process PII under a PII
      controller's instructions. Records the instructing controller, data processing
      agreement reference, and any sub-processors engaged on the controller's behalf.
    comments:
    - In some jurisdictions the PII processor is bound by a contract
    - '{''Distinct from a third party'': ''legal control of PII remains with the original
      PII controller''}'
    - 'Reference: ISO/IEC 29100:2024 Clause 3.10 and 5.2.4. ISO/IEC standards text
      is copyright ISO - not reproduced here.'
    in_subset:
    - privacy_framework_core
    from_schema: https://w3id.org/lmodel/iso29100
    exact_mappings:
    - dpv:DataProcessor
    is_a: PrivacyStakeholder
    slots:
    - NamedEntity_id
    - name
    - description
    - created_date
    - modified_date
    - contact_information
    - jurisdictions
    - instructing_controller
    - processing_agreement_ref
    - sub_processors
    class_uri: iso29100:PIIProcessor
  ThirdParty:
    name: ThirdParty
    definition_uri: https://w3id.org/lmodel/iso29100/ThirdParty
    annotations:
      iso29100_clause:
        tag: iso29100_clause
        value: '3.24'
    description: "Schema class for an external entity that receives PII outside the\
      \ PII processor relationship \u2014 i.e., as a recipient that typically becomes\
      \ a PII controller in its own right. Captures the receiving purpose and the\
      \ legal basis for the transfer."
    comments:
    - Third parties do not process PII on behalf of the original PII controller
    - Upon receiving PII, a third party typically assumes controller responsibilities
    - 'Reference: ISO/IEC 29100:2024 Clause 3.24 and 5.2.5. ISO/IEC standards text
      is copyright ISO - not reproduced here.'
    in_subset:
    - privacy_framework_core
    from_schema: https://w3id.org/lmodel/iso29100
    exact_mappings:
    - dpv:ThirdParty
    is_a: PrivacyStakeholder
    slots:
    - NamedEntity_id
    - name
    - description
    - created_date
    - modified_date
    - contact_information
    - jurisdictions
    - receiving_purpose
    - transfer_basis
    class_uri: iso29100:ThirdParty
  PersonallyIdentifiableInformation:
    name: PersonallyIdentifiableInformation
    definition_uri: https://w3id.org/lmodel/iso29100/PersonallyIdentifiableInformation
    annotations:
      iso29100_clause:
        tag: iso29100_clause
        value: '3.7'
    description: "Schema class representing a data element or attribute set that can\
      \ be linked back to a natural person \u2014 either directly or through combination\
      \ with other attributes. Captures sensitivity classification, identifier type,\
      \ pseudonymization status, retention schedule, and processing operations applicable\
      \ to the data."
