    - Encompasses direct identifiers, linkable attributes, and combinations thereof
    - Sensitivity assessment should consider context and combination of attributes
    - 'Reference: ISO/IEC 29100:2024 Clause 3.7 and 5.4. ISO/IEC standards text is
      copyright ISO - not reproduced here.'
