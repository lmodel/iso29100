        tag: iso29100_clause
        value: '3.18'
    description: Schema class for a structured evaluation of the privacy implications
      of a processing activity or ICT system. Records assessment scope, identified
      and treated risks, accepted residual risks, stakeholder consultation records,
      and overall assessment outcome.
    comments:
