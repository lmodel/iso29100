name: iso29100
annotations:
  standard_reference:
    tag: standard_reference
    value: ISO/IEC 29100:2024(E)
  standard_title:
    tag: standard_title
    value: "Information technology \u2014 Security techniques \u2014 Privacy framework"
  standard_edition:
    tag: standard_edition
    value: Second edition
  standard_date:
    tag: standard_date
    value: 2024-02
  previous_edition:
    tag: previous_edition
    value: ISO/IEC 29100:2011/Amd 1:2018
  rights_notice:
    tag: rights_notice
    value: This project is licensed under Apache-2.0 for original code and schema
      structure. ISO/IEC standards text is owned by ISO and is not redistributed by
      this project license.
  schema_maintainer:
    tag: schema_maintainer
    value: noel.mcloughlin@gmail.com
  schema_status:
    tag: schema_status
    value: stable
description: 'A comprehensive LinkML schema modeling the ISO/IEC 29100:2024 privacy
  framework for information and communication technology (ICT) systems. Captures actors
  and roles, PII recognition, privacy safeguarding requirements, the eleven privacy
  principles, and the privacy risk management process.

  This schema covers: - Privacy framework actors (PII principal, controller, processor,
  third party) - Personally identifiable information (PII) and its categories - Privacy
  principles (11 principles from Clause 6) - Privacy safeguarding requirements and
  influencing factors - Privacy risk management including privacy impact assessment
  - Privacy policies, privacy controls, consent records, and privacy preferences'
title: 'ISO 29100 / Privacy Framework: LinkML Schema'
see_also:
- https://www.iso.org/standard/85938.html
- https://dev.dpvcg.org/mappings/iso/
id: https://w3id.org/lmodel/iso29100
version: 1.0.0
imports:
- linkml:types
license: https://www.apache.org/licenses/LICENSE-2.0
prefixes:
  linkml:
    prefix_prefix: linkml
    prefix_reference: https://w3id.org/linkml/
  iso29100:
    prefix_prefix: iso29100
    prefix_reference: https://w3id.org/lmodel/iso29100/
  iso27001:
    prefix_prefix: iso27001
    prefix_reference: https://w3id.org/lmodel/iso27001/
  schema:
    prefix_prefix: schema
    prefix_reference: http://schema.org/
  dcterms:
    prefix_prefix: dcterms
    prefix_reference: http://purl.org/dc/terms/
  rdfs:
    prefix_prefix: rdfs
    prefix_reference: http://www.w3.org/2000/01/rdf-schema#
  dpv:
    prefix_prefix: dpv
    prefix_reference: https://w3id.org/dpv#
default_prefix: iso29100
default_range: string
subsets:
  privacy_framework_core:
    name: privacy_framework_core
    definition_uri: https://w3id.org/lmodel/iso29100/PrivacyFrameworkCore
    description: 'Core privacy framework elements: actors, roles, PII concept, interactions,
      and the overall framework container (Clauses 5.1-5.3).'
    comments:
    - Covers the fundamental building blocks of the privacy framework
    from_schema: https://w3id.org/lmodel/iso29100
  pii_recognition:
    name: pii_recognition
    definition_uri: https://w3id.org/lmodel/iso29100/PiiRecognition
    description: Elements relating to recognizing and categorizing personally identifiable
      information, including identifiers, sensitivity, and pseudonymization (Clause
      5.4).
    from_schema: https://w3id.org/lmodel/iso29100
  privacy_safeguarding:
    name: privacy_safeguarding
    definition_uri: https://w3id.org/lmodel/iso29100/PrivacySafeguarding
    description: 'Privacy safeguarding requirements and their influencing factors:
      legal, regulatory, contractual, business, and other factors (Clause 5.5).'
    from_schema: https://w3id.org/lmodel/iso29100
  privacy_governance:
    name: privacy_governance
    definition_uri: https://w3id.org/lmodel/iso29100/PrivacyGovernance
    description: Privacy policies, privacy controls, and governance elements that
      implement safeguarding requirements (Clauses 5.6-5.7).
    from_schema: https://w3id.org/lmodel/iso29100
  privacy_principles:
    name: privacy_principles
    definition_uri: https://w3id.org/lmodel/iso29100/PrivacyPrinciples
    annotations:
      principle_count:
        tag: principle_count
        value: '11'
    description: The eleven privacy principles defined in Clause 6 of ISO/IEC 29100:2024.
      These principles guide the design and operation of privacy programs.
    from_schema: https://w3id.org/lmodel/iso29100
  privacy_risk_management:
    name: privacy_risk_management
    definition_uri: https://w3id.org/lmodel/iso29100/PrivacyRiskManagement
    description: Elements supporting privacy risk management, including privacy impact
      assessments and privacy risk treatment (Clauses 3.17-3.18, 5.5).
    from_schema: https://w3id.org/lmodel/iso29100
types:
  positive_integer_type:
    name: positive_integer_type
    definition_uri: https://w3id.org/lmodel/iso29100/PositiveIntegerType
    description: Integer greater than zero; natural number explicitly excluding zero.
    from_schema: https://w3id.org/lmodel/iso29100
    base: int
    uri: xsd:positiveInteger
  duration_type:
    name: duration_type
    definition_uri: https://w3id.org/lmodel/iso29100/DurationType
    description: ISO 8601 duration value such as P1Y, P30D, or PT4H.
    from_schema: https://w3id.org/lmodel/iso29100
    base: str
    uri: xsd:duration
  string:
    name: string
    definition_uri: https://w3id.org/linkml/String
    description: A character string
    notes:
    - In RDF serializations, a slot with range of string is treated as a literal or
      type xsd:string.   If you are authoring schemas in LinkML YAML, the type is
      referenced with the lower case "string".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Text
    base: str
    uri: xsd:string
  integer:
    name: integer
    definition_uri: https://w3id.org/linkml/Integer
    description: An integer
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "integer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Integer
    base: int
    uri: xsd:integer
  boolean:
    name: boolean
    definition_uri: https://w3id.org/linkml/Boolean
    description: A binary (true or false) value
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "boolean".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Boolean
    base: Bool
    uri: xsd:boolean
    repr: bool
  float:
    name: float
    definition_uri: https://w3id.org/linkml/Float
    description: A real number that conforms to the xsd:float specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "float".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Float
    base: float
    uri: xsd:float
  double:
    name: double
    definition_uri: https://w3id.org/linkml/Double
    description: A real number that conforms to the xsd:double specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "double".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:Float
    base: float
    uri: xsd:double
  decimal:
    name: decimal
    definition_uri: https://w3id.org/linkml/Decimal
    description: A real number with arbitrary precision that conforms to the xsd:decimal
      specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "decimal".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    broad_mappings:
    - schema:Number
    base: Decimal
    uri: xsd:decimal
  time:
    name: time
    definition_uri: https://w3id.org/linkml/Time
    description: A time object represents a (local) time of day, independent of any
      particular day
    notes:
    - URI is dateTime because OWL reasoners do not work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "time".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Time
    base: XSDTime
    uri: xsd:time
    repr: str
  date:
    name: date
    definition_uri: https://w3id.org/linkml/Date
    description: a date (year, month and day) in an idealized calendar
    notes:
    - URI is dateTime because OWL reasoners don't work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Date
    base: XSDDate
    uri: xsd:date
    repr: str
  datetime:
    name: datetime
    definition_uri: https://w3id.org/linkml/Datetime
    description: The combination of a date and time
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:DateTime
    base: XSDDateTime
    uri: xsd:dateTime
    repr: str
  date_or_datetime:
    name: date_or_datetime
    definition_uri: https://w3id.org/linkml/DateOrDatetime
    description: Either a date or a datetime
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date_or_datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: linkml:DateOrDatetime
    repr: str
  uriorcurie:
    name: uriorcurie
    definition_uri: https://w3id.org/linkml/Uriorcurie
    description: a URI or a CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uriorcurie".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: URIorCURIE
    uri: xsd:anyURI
    repr: str
  curie:
    name: curie
    definition_uri: https://w3id.org/linkml/Curie
    conforms_to: https://www.w3.org/TR/curie/
    description: a compact URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "curie".
    comments:
    - in RDF serializations this MUST be expanded to a URI
    - in non-RDF serializations MAY be serialized as the compact representation
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: Curie
    uri: xsd:string
    repr: str
  uri:
    name: uri
    definition_uri: https://w3id.org/linkml/Uri
    conforms_to: https://www.ietf.org/rfc/rfc3987.txt
    description: a complete URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uri".
    comments:
    - in RDF serializations a slot with range of uri is treated as a literal or type
      xsd:anyURI unless it is an identifier or a reference to an identifier, in which
      case it is translated directly to a node
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:URL
    base: URI
    uri: xsd:anyURI
    repr: str
  ncname:
    name: ncname
    definition_uri: https://w3id.org/linkml/Ncname
    description: Prefix part of CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "ncname".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NCName
    uri: xsd:string
    repr: str
  objectidentifier:
    name: objectidentifier
    definition_uri: https://w3id.org/linkml/Objectidentifier
    description: A URI or CURIE that represents an object in the model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "objectidentifier".
    comments:
    - Used for inheritance and type checking
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: ElementIdentifier
    uri: shex:iri
    repr: str
  nodeidentifier:
    name: nodeidentifier
    definition_uri: https://w3id.org/linkml/Nodeidentifier
    description: A URI, CURIE or BNODE that represents a node in a model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "nodeidentifier".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NodeIdentifier
    uri: shex:nonLiteral
    repr: str
  jsonpointer:
    name: jsonpointer
    definition_uri: https://w3id.org/linkml/Jsonpointer
    conforms_to: https://datatracker.ietf.org/doc/html/rfc6901
    description: A string encoding a JSON Pointer. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to a valid object within the current
      instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpointer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  jsonpath:
    name: jsonpath
    definition_uri: https://w3id.org/linkml/Jsonpath
    conforms_to: https://www.ietf.org/archive/id/draft-goessner-dispatch-jsonpath-00.html
    description: A string encoding a JSON Path. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to zero or more valid objects within
      the current instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  sparqlpath:
    name: sparqlpath
    definition_uri: https://w3id.org/linkml/Sparqlpath
    conforms_to: https://www.w3.org/TR/sparql11-query/#propertypaths
    description: A string encoding a SPARQL Property Path. The value of the string
      MUST conform to SPARQL syntax and SHOULD dereference to zero or more valid objects
      within the current instance document when encoded as RDF.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "sparqlpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
enums:
  PrivacyPrinciple:
    name: PrivacyPrinciple
    definition_uri: https://w3id.org/lmodel/iso29100/PrivacyPrinciple
    annotations:
      iso29100_clause:
        tag: iso29100_clause
        value: '6'
      principle_count:
        tag: principle_count
        value: '11'
    description: The eleven privacy principles defined in ISO/IEC 29100:2024 Clause
      6 that govern the processing of PII in ICT systems.
    in_subset:
    - privacy_principles
    from_schema: https://w3id.org/lmodel/iso29100
    permissible_values:
      consent_and_choice:
        text: consent_and_choice
        description: 'Schema value for privacy principle 1 (Clause 6.2): the organization
          gives PII principals meaningful choice over processing of their PII, manages
          opt-in consent mechanisms, and provides readily accessible means to withdraw
          consent.'
        meaning: dpv:InformedConsent
        annotations:
          iso29100_clause:
            tag: iso29100_clause
            value: '6.2'
          principle_number:
            tag: principle_number
            value: '1'
      purpose_legitimacy_and_specification:
        text: purpose_legitimacy_and_specification
        description: 'Schema value for privacy principle 2 (Clause 6.3): the organization
          ensures each processing purpose is lawful, relies on a valid legal basis,
          and is communicated to PII principals prior to or at the time of collection.'
        meaning: dpv:Purpose
        annotations:
          iso29100_clause:
            tag: iso29100_clause
            value: '6.3'
          principle_number:
            tag: principle_number
            value: '2'
      collection_limitation:
        text: collection_limitation
        description: 'Schema value for privacy principle 3 (Clause 6.4): the organization
          limits PII collection to what is lawful and strictly necessary to fulfil
          the stated processing purposes.'
        annotations:
          iso29100_clause:
            tag: iso29100_clause
            value: '6.4'
          principle_number:
            tag: principle_number
            value: '3'
      data_minimization:
        text: data_minimization
        description: 'Schema value for privacy principle 4 (Clause 6.5): the organization
          designs processing procedures and ICT systems to minimize the volume of
          PII handled and the number of parties with access to it.'
        annotations:
          iso29100_clause:
            tag: iso29100_clause
            value: '6.5'
          principle_number:
            tag: principle_number
            value: '4'
      use_retention_and_disclosure_limitation:
        text: use_retention_and_disclosure_limitation
        description: 'Schema value for privacy principle 5 (Clause 6.6): the organization
          limits use, retention, and disclosure of PII to the minimum needed for legitimate
          purposes, and securely disposes of PII once those purposes have been fulfilled.'
        annotations:
          iso29100_clause:
            tag: iso29100_clause
            value: '6.6'
          principle_number:
            tag: principle_number
            value: '5'
      accuracy_and_quality:
        text: accuracy_and_quality
        description: 'Schema value for privacy principle 6 (Clause 6.7): the organization
          ensures PII is accurate, complete, current, and fit for purpose, and establishes
          procedures for verification, correction, and ongoing quality control of
          processed PII.'
        annotations:
          iso29100_clause:
            tag: iso29100_clause
            value: '6.7'
          principle_number:
            tag: principle_number
            value: '6'
      openness_transparency_and_notice:
        text: openness_transparency_and_notice
        description: 'Schema value for privacy principle 7 (Clause 6.8): the organization
          provides PII principals with clear, accessible information about its PII
          processing policies and practices, and notifies them of material changes
          to those policies.'
        annotations:
          iso29100_clause:
            tag: iso29100_clause
            value: '6.8'
          principle_number:
            tag: principle_number
            value: '7'
      individual_participation_and_access:
        text: individual_participation_and_access
        description: 'Schema value for privacy principle 8 (Clause 6.9): the organization
          gives PII principals the ability to access and review their PII and to challenge
          its accuracy and completeness, subject to applicable law.'
        meaning: dpv:DataSubjectRight
        annotations:
          iso29100_clause:
            tag: iso29100_clause
            value: '6.9'
          principle_number:
            tag: principle_number
            value: '8'
      accountability:
        text: accountability
        description: 'Schema value for privacy principle 9 (Clause 6.10): the organization
          documents and communicates its privacy obligations, ensures equivalent protection
          when transferring PII to third parties, and maintains internal complaint-handling
          and redress procedures.'
        annotations:
          iso29100_clause:
            tag: iso29100_clause
            value: '6.10'
          principle_number:
            tag: principle_number
            value: '9'
      information_security:
        text: information_security
        description: 'Schema value for privacy principle 10 (Clause 6.11): the organization
          applies appropriate security controls across operational, functional, and
          strategic levels to protect PII against unauthorized access, loss, or misuse
          throughout its full lifecycle.'
        annotations:
          iso29100_clause:
            tag: iso29100_clause
            value: '6.11'
          principle_number:
            tag: principle_number
            value: '10'
      privacy_compliance:
        text: privacy_compliance
        description: 'Schema value for privacy principle 11 (Clause 6.12): the organization
          verifies and demonstrates compliance with data protection and privacy requirements
          through audits, independent internal controls, and ongoing privacy risk
          assessments.'
        meaning: dpv:ComplianceAssessment
        annotations:
          iso29100_clause:
            tag: iso29100_clause
            value: '6.12'
          principle_number:
            tag: principle_number
            value: '11'
  PIIFlowRole:
    name: PIIFlowRole
    definition_uri: https://w3id.org/lmodel/iso29100/PIIFlowRole
    annotations:
      iso29100_clause:
        tag: iso29100_clause
        value: '5.3'
    description: The role played by an actor in a specific PII flow scenario, as described
      in Table 1 of ISO/IEC 29100:2024 Clause 5.3.
    in_subset:
    - privacy_framework_core
    from_schema: https://w3id.org/lmodel/iso29100
    permissible_values:
      pii_provider:
        text: pii_provider
        description: Actor that provides PII to another party in this flow scenario.
      pii_recipient:
        text: pii_recipient
        description: Actor that receives PII from another party in this flow scenario.
      not_involved:
        text: not_involved
        description: Actor not directly involved in this specific PII flow scenario.
  PIIProcessingOperation:
    name: PIIProcessingOperation
    definition_uri: https://w3id.org/lmodel/iso29100/PIIProcessingOperation
    annotations:
      iso29100_clause:
        tag: iso29100_clause
        value: '3.21'
    description: Categories of operations that can be performed on PII, as referenced
      in the definition of processing of PII (Clause 3.21).
    in_subset:
    - pii_recognition
    from_schema: https://w3id.org/lmodel/iso29100
    permissible_values:
      collection:
        text: collection
        description: Gathering or acquiring PII from PII principals or other sources.
        meaning: dpv:Collect
      storage:
        text: storage
        description: Storing PII in a persistent manner in ICT systems or other media.
        meaning: dpv:Store
      alteration:
        text: alteration
        description: Modifying or updating existing PII.
        meaning: dpv:Transform
      retrieval:
        text: retrieval
        description: Accessing or fetching stored PII for use.
        meaning: dpv:Access
      consultation:
        text: consultation
        description: Reviewing or examining PII without necessarily extracting it.
        meaning: dpv:Use
      disclosure:
        text: disclosure
        description: Making PII available to other parties or making it accessible.
        meaning: dpv:Disclose
      anonymization:
        text: anonymization
        description: Irreversibly altering PII such that the PII principal can no
          longer be identified directly or indirectly.
        meaning: dpv:Anonymise
      pseudonymization:
        text: pseudonymization
        description: Replacing identifying information in PII with an alias, retaining
          linkability while restricting direct identification.
        meaning: dpv:Pseudonymise
      dissemination:
        text: dissemination
        description: Widely distributing or publishing PII to multiple recipients.
        meaning: dpv:Disseminate
      deletion:
        text: deletion
        description: Removing PII such that it is no longer accessible or usable.
        meaning: dpv:Erase
      destruction:
        text: destruction
        description: Permanently and irrecoverably eliminating PII and its carriers.
        meaning: dpv:Remove
  SafeguardingRequirementFactor:
    name: SafeguardingRequirementFactor
    definition_uri: https://w3id.org/lmodel/iso29100/SafeguardingRequirementFactor
    annotations:
      iso29100_clause:
        tag: iso29100_clause
        value: '5.5'
    description: Categories of factors that influence an organization's privacy safeguarding
      requirements, as described in Clause 5.5 and Figure 1.
    in_subset:
    - privacy_safeguarding
    from_schema: https://w3id.org/lmodel/iso29100
    permissible_values:
      legal_and_regulatory:
        text: legal_and_regulatory
        description: Safeguarding requirements arising from applicable laws (international,
          national, and local), regulations, judicial decisions, and negotiated labour
          or work-council agreements.
        meaning: dpv:LegalBasis
        annotations:
          iso29100_clause:
            tag: iso29100_clause
            value: 5.5.2
      contractual:
        text: contractual
        description: Safeguarding requirements set out in data processing agreements,
          company policies, and binding corporate rules agreed between PII controllers,
          processors, and other parties.
        meaning: dpv:Contract
        annotations:
          iso29100_clause:
            tag: iso29100_clause
            value: 5.5.3
      business:
        text: business
        description: Safeguarding requirements driven by the application's characteristics,
          industry guidelines, codes of conduct, or standards voluntarily adopted
          by the organization as part of its business model.
        annotations:
          iso29100_clause:
            tag: iso29100_clause
            value: 5.5.4
      other:
        text: other
        description: Safeguarding requirements arising from PII principal privacy
          preferences, internal control frameworks, or technical standards voluntarily
          adopted by the organization.
        annotations:
          iso29100_clause:
            tag: iso29100_clause
            value: 5.5.5
  PIISensitivityCategory:
    name: PIISensitivityCategory
    definition_uri: https://w3id.org/lmodel/iso29100/PIISensitivityCategory
    annotations:
      iso29100_clause:
        tag: iso29100_clause
        value: '3.23'
    description: Categories of PII based on sensitivity, distinguishing standard PII
      from sensitive PII as defined in Clause 3.23.
    in_subset:
    - pii_recognition
    from_schema: https://w3id.org/lmodel/iso29100
    permissible_values:
      standard:
        text: standard
        description: PII that does not meet the threshold for sensitive PII but still
          requires appropriate privacy protection measures.
      sensitive:
        text: sensitive
        description: PII warranting heightened protection due to its potential for
          significant adverse impact on the individual, or because applicable law
          classifies it as a special category. Typical examples include health, biometric,
          financial, racial, religious, political, and sexual orientation data. Processing
          may require opt-in consent or specific legal authorization.
        meaning: dpv:SpecialCategoryPersonalData
        annotations:
          iso29100_clause:
            tag: iso29100_clause
            value: '3.23'
  ConsentMechanism:
    name: ConsentMechanism
    definition_uri: https://w3id.org/lmodel/iso29100/ConsentMechanism
    annotations:
      iso29100_clause:
        tag: iso29100_clause
        value: '3.6'
    description: The mechanism by which a PII principal provides or withholds consent
      for PII processing, as referenced in Clauses 3.6 and 6.2.
    in_subset:
    - privacy_framework_core
    from_schema: https://w3id.org/lmodel/iso29100
    permissible_values:
      opt_in:
        text: opt_in
        description: The PII principal must take an explicit action to express prior
          consent for their PII to be processed for a particular purpose.
        meaning: dpv:ExplicitlyExpressedConsent
        annotations:
          iso29100_clause:
            tag: iso29100_clause
            value: '3.6'
      opt_out:
        text: opt_out
        description: The PII principal must take a separate action to withhold or
          withdraw consent; processing is presumed permitted unless that action is
          taken.
        meaning: dpv:ImpliedConsent
      implied:
        text: implied
        description: Consent implied by some action of the PII principal, such as
          placing an order or using a service, where applicable law permits.
  PrivacyRiskLevel:
    name: PrivacyRiskLevel
    definition_uri: https://w3id.org/lmodel/iso29100/PrivacyRiskLevel
    description: Qualitative assessment of privacy risk level based on likelihood
      and potential adverse consequences for PII principals.
    in_subset:
    - privacy_risk_management
    from_schema: https://w3id.org/lmodel/iso29100
    permissible_values:
      low:
        text: low
        description: Limited potential adverse consequences for PII principals.
      medium:
        text: medium
        description: Moderate risk requiring management attention and planned controls.
      high:
        text: high
        description: Significant risk with potentially serious consequences for PII
          principals.
      very_high:
        text: very_high
        description: Severe risk with potentially catastrophic or irreversible consequences
          for PII principals requiring immediate treatment.
  PrivacyControlType:
    name: PrivacyControlType
    definition_uri: https://w3id.org/lmodel/iso29100/PrivacyControlType
    annotations:
      iso29100_clause:
        tag: iso29100_clause
        value: '3.12'
    description: Categories of privacy controls that treat privacy risks by reducing
      their likelihood or consequences, as noted in Clause 3.12 Note 1.
    in_subset:
    - privacy_governance
    from_schema: https://w3id.org/lmodel/iso29100
    permissible_values:
      organizational:
        text: organizational
        description: Policies, procedures, guidelines, management practices, or organizational
          structures used as privacy controls.
        meaning: dpv:OrganisationalMeasure
      physical:
        text: physical
        description: Physical measures protecting PII and PII processing infrastructure.
        meaning: dpv:PhysicalMeasure
      technical:
        text: technical
        description: ICT measures, products, or services that protect privacy, including
          privacy enhancing technologies (PETs).
        meaning: dpv:TechnicalMeasure
      legal_contractual:
        text: legal_contractual
        description: Legal contracts, binding corporate rules, or data processing
          agreements implementing privacy safeguards.
        meaning: dpv:LegalMeasure
