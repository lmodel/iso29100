    definition_uri: https://w3id.org/lmodel/iso29100/PrivacyControl
    annotations:
      iso29100_clause:
        tag: iso29100_clause
        value: '3.12'
    description: Schema class for a protective measure that manages privacy risks
      within the framework. Can be organizational, physical, technical (including
      Privacy Enhancing Technologies), or legal-contractual in nature; linked to the
      principles and safeguarding requirements it addresses.
    comments:
    - Also used as a synonym for safeguard or countermeasure
    - Should be identified through privacy risk assessment and treatment
    - '{''Privacy by design'': ''controls should be integrated at the design phase
      of ICT systems''}'
    - 'Reference: ISO/IEC 29100:2024 Clause 3.12 and 5.7. ISO/IEC standards text is
      copyright ISO - not reproduced here.'
