  ConsentRecord:
    name: ConsentRecord
    definition_uri: https://w3id.org/lmodel/iso29100/ConsentRecord
    annotations:
      iso29100_clause:
        tag: iso29100_clause
        value: '3.4'
    description: "Schema class documenting a PII principal's agreement to processing\
      \ of their PII for stated purposes. Records the consent mechanism used, scope,\
      \ current status, and withdrawal date \u2014 supporting auditability of the\
      \ consent and choice privacy principle."
    comments:
    - Consent must be freely given, specific, and informed
    - Opt-in required for sensitive PII unless applicable law permits otherwise
    - Withdrawal of consent must be easily exercisable and free of charge
    - 'Reference: ISO/IEC 29100:2024 Clause 3.4 and 6.2. ISO/IEC standards text is
      copyright ISO - not reproduced here.'
