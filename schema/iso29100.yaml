  PrivacyPolicy:
    name: PrivacyPolicy
    definition_uri: https://w3id.org/lmodel/iso29100/PrivacyPolicy
    annotations:
      iso29100_clause:
        tag: iso29100_clause
        value: '3.14'
    description: Schema class for a governing document expressing an organization's
      intentions and commitments for PII processing. Covers both the internal policy
      document and any external privacy notice made available to PII principals (referred
      to as a notice in this framework).
    comments:
