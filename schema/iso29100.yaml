    annotations:
      iso29100_clause:
        tag: iso29100_clause
        value: '3.17'
    description: Schema class representing a potential adverse outcome for PII principals
      from a PII processing activity. Captures the risk source, likelihood and impact
      assessments, inherent and residual risk levels, and links to mitigating controls
      and accountable risk owner.
    comments:
    - Should be assessed in terms of likelihood and potential consequences for PII
      principals
    - Corresponds to risk in ISO/IEC 27000 context (Annex A Table)
    - 'Reference: ISO/IEC 29100:2024 Clause 3.17 and 5.5. ISO/IEC standards text is
      copyright ISO - not reproduced here.'
    in_subset:
