    definition_uri: https://w3id.org/lmodel/iso29100/PrivacyBreach
    annotations:
      iso29100_clause:
        tag: iso29100_clause
        value: '3.11'
    description: Schema class for a recorded incident in which PII was processed in
      a manner that violates applicable privacy safeguarding requirements. Tracks
      breach details, affected PII categories, notification obligations, remediation
      actions, and lessons learned.
    comments:
