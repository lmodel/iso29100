# ==============================================================================
# ISO/IEC 27001:2022 aligned Information Security Management System Schema
# ==============================================================================
# This LinkML schema provides a machine-readable, validatable representation of
# ISMS entities and relationships mapped to ISO/IEC 27001:2022 references.
#
# Intended use cases:
#   - Publishing open compliance data (e.g., Statements of Applicability)
#   - Automating audit evidence collection and gap analysis
#   - Integrating ISMS data with GRC platforms
#   - Generating RDF/JSON-LD for linked data interoperability
#
# Schema version aligns with ISO/IEC 27001:2022 (Third edition, 2022-10)
# with amendments up to Amd. 1:2024 (Climate action changes).
# ==============================================================================

id: https://w3id.org/lmodel/iso27001
name: iso27001
title: "ISO 27001 / ISMS: LinkML Schema"
description: >-
  A comprehensive LinkML schema modeling ISMS entities, workflows, and
  traceability links aligned to ISO/IEC 27001:2022 clause and Annex references.
  Designed for open data publication, automated validation, and integration with
  governance, risk, and compliance (GRC) systems.

  This schema captures:
  - ISMS lifecycle (establish, implement, maintain, improve)
  - Risk assessment and treatment processes (Clause 6.1)
  - Annex A control catalog structures organized by domain
  - Audit, measurement, and continual improvement artifacts

license: https://www.apache.org/licenses/LICENSE-2.0
version: 1.0.0

# -----------------------
# Schema-level Annotations
# -----------------------
annotations:
  standard_reference: ISO/IEC 27001:2022(E)
  amendment_reference: ISO/IEC 27001:2022/Amd. 1:2024(E)
  amendment_title: Climate action changes
  amendment_date: 2024-02
  standard_title: >-
    Information security, cybersecurity and privacy protection - 
    Information security management systems - Requirements
  standard_edition: Third edition
  standard_date: 2022-10
  normative_reference: ISO/IEC 27000 (vocabulary and overview)
  aligned_standard: ISO/IEC 27002:2022 (Annex A control guidance)
  risk_framework_alignment: ISO 31000:2018
  rights_notice: >-
    This project is licensed under Apache-2.0 for original code and schema
    structure. ISO/IEC standards text is owned by ISO and is not redistributed
    by this project license.
  schema_maintainer: noel.mcloughlin@gmail.com
  schema_status: stable

# -----------------------
# Prefix Declarations
# -----------------------
prefixes:
  linkml: https://w3id.org/linkml/
  iso27001: https://w3id.org/lmodel/iso27001/
  iso27002: https://w3id.org/lmodel/iso27002/
  iso: https://www.iso.org/standard/
  schema: http://schema.org/
  dcterms: http://purl.org/dc/terms/
  skos: "http://www.w3.org/2004/02/skos/core#"
  prov: "http://www.w3.org/ns/prov#"
  cis_controls: https://w3id.org/lmodel/cis-controls/

default_prefix: iso27001
default_range: string

# -----------------------
# Imports
# -----------------------
imports:
  - linkml:types

# ----------------------
# Types
# ----------------------
types:
  positive integer type:
    base: int
    uri: xsd:positiveInteger
    description: >-
      integer greater than zero; natural number explicitly excluding zero
    exact_mappings:
      - wikidata:Q28920044

  unsigned short type:
    base: int
    uri: xsd:unsignedShort
    description: >-
      data type for non-negative integers that can be represented with 16 bits
    exact_mappings:
      - wikidata:Q110650833

  duration type:
    base: str
    uri: xsd:duration
    description: >-
      ISO 8601 duration value such as P1Y, P30D, or PT4H

# -----------------------
# Subsets
# -----------------------
# Subsets allow filtering schema elements by functional area or use case.
# Use `in_subset` on classes/slots to assign membership.

subsets:
  isms_core:
    description: >-
      Core ISMS structural elements required for conformity with Clauses 4-10.
      These classes represent the minimum viable data model for ISMS documentation.
    comments:
      - Mandatory for any ISO 27001 conformance dataset
      - Maps to requirement statements in the standard

  annex_a_controls:
    description: >-
      Classes and enumerations representing the 93 controls in Annex A,
      organized into four domains: organizational, people, physical, technological.
    comments:
      - Derived from ISO/IEC 27002:2022 Clauses 5-8
      - Used in Statement of Applicability (SoA) generation
    annotations:
      control_count: "93"

  risk_management:
    description: >-
      Elements supporting risk assessment (6.1.2) and risk treatment (6.1.3).
      Aligned with ISO 31000:2018 principles.
    comments:
      - Includes risk identification, analysis, evaluation, and treatment
      - Links risks to controls and residual risk acceptance

  performance_evaluation:
    description: >-
      Classes for monitoring, measurement, internal audit, and management review
      per Clauses 9.1-9.3.
    comments:
      - Captures audit programs, findings, and KPIs
      - Supports evidence retention requirements

  continual_improvement:
    description: >-
      Elements for nonconformity management, corrective actions, and improvement
      tracking per Clause 10.
    comments:
      - Links nonconformities to root causes and corrective actions
      - Tracks improvement opportunities

  documented_information:
    description: >-
      Classes representing required documented information per Clause 7.5.
      Supports document control and retention requirements.
    comments:
      - Includes policies, procedures, records, and evidence
      - Tracks version control and approval status

# ==============================================================================
# ENUMERATIONS
# ==============================================================================

enums:
  ControlCategory:
    description: >-
      The four control domains defined in ISO/IEC 27001:2022 Annex A,
      corresponding to Clauses 5-8 of ISO/IEC 27002:2022.
    in_subset:
      - annex_a_controls
    annotations:
      iso27002_mapping: Clauses 5-8
    permissible_values:
      organizational:
        description: >-
          Organizational controls (Annex A.5) - policies, roles, asset management,
          access control, supplier relationships, incident management, compliance.
        annotations:
          annex_clause: "5"
          control_count: "37"
      people:
        description: >-
          People controls (Annex A.6) - screening, employment terms, awareness,
          disciplinary process, termination responsibilities, remote working.
        annotations:
          annex_clause: "6"
          control_count: "8"
      physical:
        description: >-
          Physical controls (Annex A.7) - perimeters, entry controls, equipment
          protection, secure areas, media handling, cabling, maintenance.
        annotations:
          annex_clause: "7"
          control_count: "14"
      technological:
        description: >-
          Technological controls (Annex A.8) - endpoint security, access restrictions,
          authentication, malware protection, logging, cryptography, secure development.
        annotations:
          annex_clause: "8"
          control_count: "34"

  ImplementationStatus:
    description: >-
      Lifecycle status of a security control, used in Statement of Applicability
      and control tracking.
    in_subset:
      - annex_a_controls
    permissible_values:
      not_started:
        description: Control identified but no implementation activities begun.
      planned:
        description: Control scheduled for implementation with defined timeline.
      in_progress:
        description: Implementation actively underway but not yet complete.
      implemented:
        description: Control fully implemented and operational.
      not_applicable:
        description: >-
          Control excluded from scope with documented justification per 6.1.3 d).
        comments:
          - Requires justification in Statement of Applicability

  RiskTreatmentOption:
    description: >-
      Standard risk treatment options per ISO 31000 and ISO 27005.
    in_subset:
      - risk_management
    annotations:
      iso31000_reference: Clause 6.5
    permissible_values:
      modify:
        description: >-
          Apply controls to change the risk level (reduce likelihood or impact).
        aliases:
          - mitigate
          - reduce
      accept:
        description: >-
          Accept the risk without further treatment, within risk appetite.
          Requires risk owner approval.
        aliases:
          - retain
      avoid:
        description: >-
          Eliminate the risk by removing the activity or asset that creates it.
        aliases:
          - terminate
      share:
        description: >-
          Transfer or share risk with external parties (e.g., insurance, outsourcing).
        aliases:
          - transfer

  RiskLevel:
    description: >-
      Qualitative risk rating derived from likelihood x impact analysis.
    in_subset:
      - risk_management
    permissible_values:
      very_low:
        description: Negligible risk requiring no immediate action.
      low:
        description: Minor risk manageable through routine procedures.
      medium:
        description: Moderate risk requiring management attention and planned controls.
      high:
        description: Significant risk requiring priority treatment and escalation.
      critical:
        description: >-
          Severe risk threatening organizational objectives; requires immediate
          executive action and resource allocation.

  DocumentType:
    description: >-
      Categories of documented information required or recommended by ISO 27001.
    in_subset:
      - documented_information
    permissible_values:
      policy:
        description: High-level statement of intent and direction (e.g., IS policy per 5.2).
      procedure:
        description: Documented steps for performing activities consistently.
      standard:
        description: Mandatory requirements for specific technologies or processes.
      guideline:
        description: Recommended practices that support policies and procedures.
      record:
        description: Evidence of activities performed or results achieved.
      plan:
        description: Documented approach for achieving objectives (e.g., risk treatment plan).
      report:
        description: Formal output of assessment, audit, or review activities.

  AuditFindingType:
    description: Classification of internal audit findings.
    in_subset:
      - performance_evaluation
    permissible_values:
      major_nonconformity:
        description: >-
          Significant failure to fulfill a requirement that affects ISMS
          capability to achieve intended outcomes.
      minor_nonconformity:
        description: >-
          Isolated lapse that does not significantly affect ISMS effectiveness.
      observation:
        description: >-
          Noted condition that could lead to nonconformity if not addressed.
        aliases:
          - opportunity_for_improvement
      positive_finding:
        description: Evidence of effective implementation exceeding requirements.

  LikelihoodRating:
    description: Qualitative likelihood scale for risk assessment.
    in_subset:
      - risk_management
    permissible_values:
      rare:
        description: Highly unlikely to occur (< 5% probability).
        annotations:
          numeric_value: "1"
      unlikely:
        description: Not expected but possible (5-20% probability).
        annotations:
          numeric_value: "2"
      possible:
        description: May occur at some point (20-50% probability).
        annotations:
          numeric_value: "3"
      likely:
        description: Probably will occur (50-80% probability).
        annotations:
          numeric_value: "4"
      almost_certain:
        description: Expected to occur in most circumstances (> 80% probability).
        annotations:
          numeric_value: "5"

  ImpactRating:
    description: Qualitative impact scale for risk assessment.
    in_subset:
      - risk_management
    permissible_values:
      negligible:
        description: No significant impact on operations or objectives.
        annotations:
          numeric_value: "1"
      minor:
        description: Limited impact, easily absorbed by normal operations.
        annotations:
          numeric_value: "2"
      moderate:
        description: Noticeable impact requiring management intervention.
        annotations:
          numeric_value: "3"
      major:
        description: Serious impact on objectives, reputation, or compliance.
        annotations:
          numeric_value: "4"
      severe:
        description: Catastrophic impact threatening organizational viability.
        annotations:
          numeric_value: "5"

# ==============================================================================
# CLASSES
# ==============================================================================

classes:
  # ---------------------
  # Abstract Base Classes
  # ---------------------

  NamedEntity:
    abstract: true
    description: >-
      Abstract base class for all entities with an identifier, name, and description.
      Provides common identification and documentation slots.
    comments:
      - All concrete classes should inherit from this or a subclass
      - Ensures consistent identification across the schema
    slots:
      - id
      - name
      - description
      - created_date
      - modified_date
      - version
    slot_usage:
      id:
        identifier: true
        required: true
        description: Unique identifier for this entity instance.

  DocumentedInformation:
    is_a: NamedEntity
    abstract: true
    description: >-
      Abstract class for documented information per Clause 7.5.
      Captures metadata required for document control.
    in_subset:
      - documented_information
    comments:
      - Supports identification and control metadata for managed documents
      - Supports lifecycle, protection, and retention tracking
    annotations:
      iso27001_clause: "7.5"
    slots:
      - document_type
      - document_reference
      - author
      - owner
      - approved_by
      - approved_date
      - effective_date
      - review_date
      - status
      - classification
      - retention_period

  # ---------------------
  # Core ISMS Classes (Clauses 4-10)
  # ---------------------

  InformationSecurityManagementSystem:
    is_a: NamedEntity
    description: >-
      Top-level container representing an organization's complete ISMS per ISO 27001.
      Aggregates all components required to support the full ISMS lifecycle.
    in_subset:
      - isms_core
    comments:
      - This is the root entity for any ISMS conformance dataset
      - Aggregates ISMS processes and their relationships
      - Includes explicit scope metadata and related governance artifacts
      - "Reference: ISO/IEC 27001:2022 Clause 4.4. ISO/IEC standards text is copyright ISO - not reproduced here."
    annotations:
      iso27001_clause: "4.4"
      mandatory: "true"
    slots:
      - organization
      - scope_statement
      - scope_boundaries
      - scope_exclusions
      - context_internal_issues
      - context_external_issues
      - interested_parties
      - information_security_policy
      - objectives
      - risk_assessment_process
      - risk_treatment_process
      - statement_of_applicability
      - controls
      - roles
      - resources
      - competence_records
      - awareness_program
      - communication_plan
      - documented_information_register
      - operational_procedures
      - risk_assessments
      - risk_treatment_plans
      - monitoring_program
      - internal_audits
      - management_reviews
      - nonconformities
      - corrective_actions
      - improvements
      - certification_status
      - certification_body
      - certification_date
      - recertification_date
    related_mappings:
      - cis_controls:CISControlsDocument

  Organization:
    is_a: NamedEntity
    description: >-
      The organization establishing and operating the ISMS.
      Captures context needed for Clause 4.1 (understanding the organization).
    in_subset:
      - isms_core
    comments:
      - Context determination per 4.1 feeds into ISMS planning
      - Climate change relevance determination added by Amd. 1:2024 to Clause 4.1
      - "Reference: ISO/IEC 27001:2022 Clause 4.1 and Amd. 1:2024. ISO/IEC standards text is copyright ISO - not reproduced here."
    annotations:
      iso27001_clause: "4.1"
      iso27001_amendment: "Amd. 1:2024"
    slots:
      - legal_name
      - trading_names
      - organization_type
      - industry_sector
      - size_category
      - employee_count
      - geographic_locations
      - regulatory_jurisdictions
      - parent_organization
      - subsidiaries
      - climate_change_relevant

  InterestedParty:
    is_a: NamedEntity
    description: >-
      A stakeholder whose needs and expectations are relevant to the ISMS per 4.2.
      Includes internal parties (employees, management) and external parties
      (customers, regulators, suppliers).
    in_subset:
      - isms_core
    comments:
      - Captures stakeholder needs and expectations relevant to ISMS scope
      - Requirements may include legal, regulatory, and contractual obligations
      - Relevant interested parties can have requirements related to climate change (Amd. 1:2024 Clause 4.2 Note 2)
      - "Reference: ISO/IEC 27001:2022 Clause 4.2 and Amd. 1:2024. ISO/IEC standards text is copyright ISO - not reproduced here."
    annotations:
      iso27001_clause: "4.2"
      iso27001_amendment: "Amd. 1:2024"
    slots:
      - party_type
      - relationship
      - requirements
      - communication_needs
      - contact_information

  # ---------------------
  # Leadership and Governance (Clause 5)
  # ---------------------

  InformationSecurityPolicy:
    is_a: DocumentedInformation
    description: >-
      The information security policy established by top management per Clause 5.2.
      Provides framework for setting objectives and demonstrates commitment.
    in_subset:
      - isms_core
      - documented_information
    comments:
      - Captures policy intent and governance commitments
      - Supports communication and acknowledgement tracking
      - "Reference: ISO/IEC 27001:2022 Clause 5.2. ISO/IEC standards text is copyright ISO - not reproduced here."
    annotations:
      iso27001_clause: "5.2"
      mandatory: "true"
    slots:
      - policy_statement
      - policy_objectives_framework
      - commitment_statements
      - applicability_statement
      - communication_date
      - acknowledgment_required
      - related_topic_policies

  TopicSpecificPolicy:
    is_a: DocumentedInformation
    description: >-
      A policy addressing a specific information security topic, supporting
      the overarching information security policy.
    in_subset:
      - documented_information
    comments:
      - Examples include access control policy, cryptography policy, backup policy
      - Referenced throughout Annex A controls
    annotations:
      annex_a_reference: "5.1"
    slots:
      - topic_area
      - parent_policy
      - applicable_controls
      - target_audience

  Role:
    is_a: NamedEntity
    description: >-
      An information security role with defined responsibilities and authorities
      per Clause 5.3.
    in_subset:
      - isms_core
    comments:
      - Used to assign ISMS responsibilities, authorities, and accountability
      - Supports reporting-line and delegation modeling
      - "Reference: ISO/IEC 27001:2022 Clause 5.3. ISO/IEC standards text is copyright ISO - not reproduced here."
    annotations:
      iso27001_clause: "5.3"
    slots:
      - role_type
      - responsibilities
      - authorities
      - accountability
      - assigned_to
      - delegation_rules
      - reporting_line

  # ---------------------
  # Planning (Clause 6)
  # ---------------------

  InformationSecurityObjective:
    is_a: NamedEntity
    description: >-
      A measurable information security objective per Clause 6.2, established
      at relevant functions and levels of the organization.
    in_subset:
      - isms_core
    comments:
      - Designed for measurable objective tracking and periodic review
      - Links objectives to related risks, controls, and action plans
      - "Reference: ISO/IEC 27001:2022 Clause 6.2. ISO/IEC standards text is copyright ISO - not reproduced here."
    annotations:
      iso27001_clause: "6.2"
    slots:
      - objective_statement
      - target_value
      - current_value
      - metric_definition
      - measurement_method
      - measurement_frequency
      - responsible_role
      - target_date
      - achievement_status
      - related_risks
      - related_controls
      - action_plan

  RiskAssessmentProcess:
    is_a: DocumentedInformation
    description: >-
      The documented risk assessment process per Clause 6.1.2, defining criteria
      and methodology for identifying, analyzing, and evaluating risks.
    in_subset:
      - risk_management
      - documented_information
    comments:
      - Defines reusable criteria, scales, and methods for risk assessments
      - Supports repeatable assessment execution over time
      - "Reference: ISO/IEC 27001:2022 Clause 6.1.2. ISO/IEC standards text is copyright ISO - not reproduced here."
    annotations:
      iso27001_clause: "6.1.2"
      mandatory: "true"
    slots:
      - risk_acceptance_criteria
      - assessment_criteria
      - assessment_methodology
      - likelihood_scale
      - impact_scale
      - risk_matrix
      - assessment_frequency
      - trigger_events

  RiskAssessment:
    is_a: DocumentedInformation
    description: >-
      An instance of risk assessment performed per Clause 8.2, identifying
      and evaluating information security risks.
    in_subset:
      - risk_management
    comments:
      - Performed at planned intervals or when significant changes occur
      - Results are retained as documented information
      - "Reference: ISO/IEC 27001:2022 Clause 8.2. ISO/IEC standards text is copyright ISO - not reproduced here."
    annotations:
      iso27001_clause: "8.2"
    slots:
      - assessment_scope
      - assessment_date
      - assessor
      - methodology_used
      - risks_identified
      - summary_findings
      - recommendations
      - next_assessment_date

  Risk:
    is_a: NamedEntity
    description: >-
      An identified information security risk that may affect information
      security properties within the ISMS scope.
    in_subset:
      - risk_management
    comments:
      - Links threat, vulnerability, and affected assets to risk ownership
      - Supports likelihood, impact, treatment, and residual risk tracking
      - "Reference: ISO/IEC 27001:2022 Clause 6.1.2. ISO/IEC standards text is copyright ISO - not reproduced here."
    annotations:
      iso27001_clause: "6.1.2"
    slots:
      - risk_source
      - threat_description
      - vulnerability_description
      - affected_assets
      - affected_cia_properties
      - risk_owner
      - likelihood
      - impact
      - inherent_risk_level
      - existing_controls
      - residual_risk_level
      - risk_treatment_option
      - treatment_priority
      - related_treatment_plan

  RiskTreatmentProcess:
    is_a: DocumentedInformation
    description: >-
      The documented risk treatment process per Clause 6.1.3, defining how
      treatment options are selected and controls determined.
    in_subset:
      - risk_management
      - documented_information
    comments:
      - Defines how treatment options and controls are selected
      - Supports Statement of Applicability generation workflows
      - "Reference: ISO/IEC 27001:2022 Clause 6.1.3. ISO/IEC standards text is copyright ISO - not reproduced here."
    annotations:
      iso27001_clause: "6.1.3"
      mandatory: "true"
    slots:
      - treatment_options_guidance
      - control_selection_criteria
      - soa_template
      - approval_workflow

  RiskTreatmentPlan:
    is_a: DocumentedInformation
    description: >-
      A risk treatment plan documenting planned actions to address identified
      risks through selected controls.
    in_subset:
      - risk_management
      - documented_information
    comments:
      - Captures treatment execution plans with approval and acceptance metadata
      - Supports implementation status and completion tracking
      - "Reference: ISO/IEC 27001:2022 Clause 6.1.3. ISO/IEC standards text is copyright ISO - not reproduced here."
    annotations:
      iso27001_clause: "6.1.3"
    slots:
      - plan_scope
      - risks_addressed
      - treatment_actions
      - controls_to_implement
      - resources_required
      - responsible_parties
      - implementation_timeline
      - risk_owner_approval
      - approved_date
      - residual_risk_acceptance
      - implementation_status
      - completion_date
    slot_usage:
      approved_date:
        description: Date when the risk treatment plan was approved.

  StatementOfApplicability:
    is_a: DocumentedInformation
    description: >-
      The Statement of Applicability (SoA) recording which controls apply,
      their rationale, and current implementation state.
    in_subset:
      - isms_core
      - annex_a_controls
      - documented_information
    comments:
      - Records control applicability and implementation state
      - Captures inclusion or exclusion rationale for each control entry
      - "Reference: ISO/IEC 27001:2022 Clause 6.1.3 d). ISO/IEC standards text is copyright ISO - not reproduced here."
    annotations:
      iso27001_clause: "6.1.3 d)"
      mandatory: "true"
    slots:
      - soa_entries
      - total_controls
      - implemented_count
      - planned_count
      - not_applicable_count
      - last_review_date
      - approved_by

  SoAEntry:
    description: >-
      A single entry in the Statement of Applicability, documenting the
      applicability and implementation status of one control.
    in_subset:
      - annex_a_controls
    comments:
      - Each Annex A control should have a corresponding SoA entry
      - Exclusions require documented justification
    slots:
      - control_reference
      - is_applicable
      - inclusion_justification
      - exclusion_justification
      - implementation_status
      - implementation_evidence
      - responsible_role
      - target_implementation_date

  # ---------------------
  # Annex A Security Controls
  # ---------------------

  SecurityControl:
    is_a: NamedEntity
    description: >-
      A security control from Annex A of ISO/IEC 27001:2022, derived from
      ISO/IEC 27002:2022. Represents a measure that modifies risk.
    in_subset:
      - annex_a_controls
    comments:
      - 93 controls organized in four domains (organizational, people, physical, technological)
      - Controls are referenced in risk treatment and SoA
      - Supports organization-authored control statements and evidence links
      - "Reference: ISO/IEC 27001:2022 Annex A; ISO/IEC 27002:2022 Clauses 5-8. ISO/IEC standards text is copyright ISO - not reproduced here."
      - The control_text slot must contain organization-authored content only, not ISO standards text.
    annotations:
      iso27001_clause: "6.1.3"
      annex_reference: "Annex A"
    slots:
      - control_id
      - control_title
      - control_category
      - control_text
      - implementation_guidance
      - related_controls
      - applicable_threats
      - applicable_assets
      - control_owner
      - implementation_status
      - implementation_date
      - effectiveness_rating
      - last_test_date
      - evidence_references
    related_mappings:
      - cis_controls:Safeguard

  # ---------------------
  # Support (Clause 7)
  # ---------------------

  Resource:
    is_a: NamedEntity
    description: >-
      A resource provided for the ISMS per Clause 7.1, including personnel,
      infrastructure, technology, and budget.
    in_subset:
      - isms_core
    comments:
      - "Reference: ISO/IEC 27001:2022 Clause 7.1. ISO/IEC standards text is copyright ISO - not reproduced here."
    annotations:
      iso27001_clause: "7.1"
    slots:
      - resource_type
      - quantity
      - allocation_date
      - allocated_to
      - cost
      - availability_status

  CompetenceRecord:
    is_a: DocumentedInformation
    description: >-
      Evidence of competence for personnel affecting information security
      performance per Clause 7.2 d).
    in_subset:
      - isms_core
      - documented_information
    comments:
      - Documents personnel qualifications and development activities
      - Actions to acquire competence are evaluated for effectiveness
      - "Reference: ISO/IEC 27001:2022 Clause 7.2. ISO/IEC standards text is copyright ISO - not reproduced here."
    annotations:
      iso27001_clause: "7.2"
    slots:
      - person_name
      - person_role
      - required_competencies
      - education_records
      - training_records
      - experience_records
      - competency_assessment_date
      - competency_gaps
      - development_actions

  AwarenessProgram:
    is_a: DocumentedInformation
    description: >-
      The awareness program ensuring personnel understand their information
      security responsibilities per Clause 7.3.
    in_subset:
      - isms_core
    comments:
      - Tracks security awareness coverage, delivery, and personnel completion records
      - "Reference: ISO/IEC 27001:2022 Clause 7.3. ISO/IEC standards text is copyright ISO - not reproduced here."
    annotations:
      iso27001_clause: "7.3"
    slots:
      - awareness_topics
      - delivery_methods
      - target_audience
      - frequency
      - completion_tracking
      - effectiveness_measures

  CommunicationPlan:
    is_a: DocumentedInformation
    description: >-
      Plan for internal and external communications relevant to the ISMS
      per Clause 7.4.
    in_subset:
      - isms_core
      - documented_information
    comments:
      - Captures communication scope, timing, audience, and channels
      - "Reference: ISO/IEC 27001:2022 Clause 7.4. ISO/IEC standards text is copyright ISO - not reproduced here."
    annotations:
      iso27001_clause: "7.4"
    slots:
      - communication_items

  CommunicationItem:
    description: >-
      A single communication requirement within the communication plan.
    in_subset:
      - isms_core
    annotations:
      iso27001_clause: "7.4"
    slots:
      - subject
      - purpose
      - audience
      - frequency
      - method
      - responsible_party
      - records_required

  # ---------------------
  # Operation (Clause 8)
  # ---------------------

  OperationalProcedure:
    is_a: DocumentedInformation
    description: >-
      A documented procedure for operational planning and control per Clause 8.1.
    in_subset:
      - documented_information
    comments:
      - Captures process criteria, controls, and accountable roles
      - "Reference: ISO/IEC 27001:2022 Clause 8.1. ISO/IEC standards text is copyright ISO - not reproduced here."
    annotations:
      iso27001_clause: "8.1"
    slots:
      - procedure_scope
      - process_criteria
      - control_measures
      - responsible_roles
      - related_controls
      - change_control_requirements

  # ---------------------
  # Performance Evaluation (Clause 9)
  # ---------------------

  MonitoringProgram:
    is_a: DocumentedInformation
    description: >-
      The program for monitoring, measurement, analysis, and evaluation
      per Clause 9.1.
    in_subset:
      - performance_evaluation
      - documented_information
    comments:
      - Captures metrics, methods, and analysis cadence
      - Supports reproducible monitoring and evaluation records
      - "Reference: ISO/IEC 27001:2022 Clause 9.1. ISO/IEC standards text is copyright ISO - not reproduced here."
    annotations:
      iso27001_clause: "9.1"
    slots:
      - monitoring_items

  MonitoringItem:
    description: >-
      A single item to be monitored and measured per 9.1.
    in_subset:
      - performance_evaluation
    annotations:
      iso27001_clause: "9.1"
    slots:
      - metric_name
      - metric_description
      - measurement_method
      - measurement_frequency
      - responsible_party
      - analysis_frequency
      - analyst
      - target_threshold
      - alert_threshold
      - current_value
      - trend

  InternalAudit:
    is_a: DocumentedInformation
    description: >-
      An internal audit instance per Clause 9.2, assessing ISMS conformance
      and effectiveness.
    in_subset:
      - performance_evaluation
      - documented_information
    comments:
      - Captures audit scope, criteria, findings, and conclusions
      - Supports periodic conformance and effectiveness assessment records
      - "Reference: ISO/IEC 27001:2022 Clause 9.2. ISO/IEC standards text is copyright ISO - not reproduced here."
    annotations:
      iso27001_clause: "9.2"
    slots:
      - audit_reference
      - audit_type
      - audit_scope
      - audit_criteria
      - audit_objectives
      - audit_period_start
      - audit_period_end
      - lead_auditor
      - audit_team
      - auditee_representatives
      - audit_plan
      - findings
      - positive_observations
      - audit_conclusion
      - report_date
      - report_distribution

  AuditProgramme:
    is_a: DocumentedInformation
    description: >-
      The internal audit programme per 9.2.2, planning audit activities
      over a defined period.
    in_subset:
      - performance_evaluation
      - documented_information
    comments:
      - Captures planned audit activities over a defined period
      - Includes cadence rationale, resources, and qualification metadata
      - "Reference: ISO/IEC 27001:2022 Clause 9.2.2. ISO/IEC standards text is copyright ISO - not reproduced here."
    annotations:
      iso27001_clause: "9.2.2"
    slots:
      - programme_period
      - planned_audits
      - audit_frequency_rationale
      - resource_requirements
      - auditor_qualifications
      - programme_status

  AuditFinding:
    is_a: NamedEntity
    description: >-
      A finding from an internal audit, including nonconformities,
      observations, and positive findings.
    in_subset:
      - performance_evaluation
    annotations:
      iso27001_clause: "9.2"
    slots:
      - finding_type
      - clause_reference
      - control_reference
      - finding_description
      - objective_evidence
      - root_cause_analysis
      - risk_implication
      - recommended_action
      - auditee_response
      - linked_corrective_action
      - closure_status
      - closure_date

  ManagementReview:
    is_a: DocumentedInformation
    description: >-
      A management review per Clause 9.3, conducted by top management
      to evaluate ongoing ISMS performance and fitness for purpose.
    in_subset:
      - performance_evaluation
      - documented_information
    comments:
      - Captures periodic management review inputs, outputs, and follow-up actions
      - "Reference: ISO/IEC 27001:2022 Clause 9.3. ISO/IEC standards text is copyright ISO - not reproduced here."
    annotations:
      iso27001_clause: "9.3"
    slots:
      - review_date
      - attendees
      - previous_actions_status
      - context_changes
      - interested_party_changes
      - performance_trends
      - audit_results_summary
      - risk_assessment_results
      - improvement_opportunities
      - decisions
      - action_items
      - next_review_date
    slot_usage:
      review_date:
        description: Date when the management review was conducted.

  # ---------------------
  # Improvement (Clause 10)
  # ---------------------

  Nonconformity:
    is_a: NamedEntity
    description: >-
      A nonconformity identified per Clause 10.2, representing failure
      to fulfill a requirement.
    in_subset:
      - continual_improvement
    comments:
      - Captures detection, correction, consequence handling, and root-cause data
      - "Reference: ISO/IEC 27001:2022 Clause 10.2. ISO/IEC standards text is copyright ISO - not reproduced here."
    annotations:
      iso27001_clause: "10.2"
    slots:
      - nonconformity_source
      - detection_date
      - detected_by
      - requirement_violated
      - nonconformity_description
      - immediate_actions
      - consequences_addressed
      - root_cause
      - similar_nonconformities_check
      - linked_corrective_actions
      - status
      - closure_date
      - closure_evidence

  CorrectiveAction:
    is_a: NamedEntity
    description: >-
      A corrective action per Clause 10.2 to address the root cause of a
      nonconformity and reduce the likelihood of recurrence.
    in_subset:
      - continual_improvement
    comments:
      - Tracks actions intended to prevent recurrence of nonconformities
      - Supports effectiveness review and related ISMS change tracking
      - "Reference: ISO/IEC 27001:2022 Clause 10.2. ISO/IEC standards text is copyright ISO - not reproduced here."
    annotations:
      iso27001_clause: "10.2"
    slots:
      - linked_nonconformity
      - action_description
      - root_cause_addressed
      - responsible_party
      - target_completion_date
      - actual_completion_date
      - resources_required
      - effectiveness_criteria
      - effectiveness_review_date
      - effectiveness_verified
      - isms_changes_required
      - status

  ImprovementOpportunity:
    is_a: NamedEntity
    description: >-
      An opportunity for continual improvement per Clause 10.1,
      enhancing overall ISMS performance.
    in_subset:
      - continual_improvement
    comments:
      - May arise from management reviews, audits, or operational experience
      - Distinct from corrective actions (proactive vs. reactive)
      - "Reference: ISO/IEC 27001:2022 Clause 10.1. ISO/IEC standards text is copyright ISO - not reproduced here."
    annotations:
      iso27001_clause: "10.1"
    slots:
      - improvement_source
      - identification_date
      - identified_by
      - improvement_description
      - expected_benefit
      - priority
      - implementation_plan
      - responsible_party
      - target_date
      - actual_completion_date
      - outcome_assessment
      - status

  # ---------------------
  # Supporting Classes
  # ---------------------

  Asset:
    is_a: NamedEntity
    description: >-
      An information asset or associated asset requiring protection,
      per Annex A control 5.9.
    in_subset:
      - annex_a_controls
    comments:
      - Supports asset inventory, ownership, classification, and related controls
      - "Reference: ISO/IEC 27001:2022 Annex A control 5.9; ISO/IEC 27002:2022 Clause 5.9. ISO/IEC standards text is copyright ISO - not reproduced here."
    annotations:
      annex_a_control: "5.9"
    slots:
      - asset_type
      - asset_owner
      - asset_custodian
      - classification
      - location
      - criticality
      - related_risks
      - applicable_controls

  InformationSecurityEvent:
    is_a: NamedEntity
    description: >-
      An information security event per A.5.25, which may or may not
      be categorized as an incident.
    in_subset:
      - annex_a_controls
    comments:
      - "Reference: ISO/IEC 27001:2022 Annex A control 5.25; ISO/IEC 27002:2022 Clause 5.25. ISO/IEC standards text is copyright ISO - not reproduced here."
    annotations:
      annex_a_control: "5.25"
    slots:
      - event_datetime
      - reporter
      - event_description
      - affected_assets
      - initial_assessment
      - categorized_as_incident
      - linked_incident

  InformationSecurityIncident:
    is_a: NamedEntity
    description: >-
      An information security incident per A.5.26, requiring response
      per documented procedures.
    in_subset:
      - annex_a_controls
    comments:
      - Captures response lifecycle, evidence references, and lessons learned
      - "Reference: ISO/IEC 27001:2022 Annex A control 5.26; ISO/IEC 27002:2022 Clause 5.26. ISO/IEC standards text is copyright ISO - not reproduced here."
    annotations:
      annex_a_control: "5.26"
    slots:
      - incident_datetime
      - incident_category
      - severity
      - affected_assets
      - affected_cia
      - incident_description
      - detection_method
      - response_actions
      - containment_actions
      - eradication_actions
      - recovery_actions
      - root_cause
      - lessons_learned
      - evidence_collected
      - notification_required
      - notifications_made
      - closure_datetime
      - post_incident_review

# ==============================================================================
# SLOTS
# ==============================================================================

slots:
  # ---------------------
  # Common Identification Slots
  # ---------------------

  id:
    description: Unique identifier for the entity.
    range: uriorcurie
    identifier: true
    required: true
    comments:
      - Should use consistent URI/CURIE format across the dataset
    examples:
      - value: "iso27001:risk-001"
      - value: "iso27001:control-5.1"

  name:
    description: Human-readable name or title.
    range: string
    required: true

  description:
    description: Detailed description of the entity.
    range: string
    comments:
      - Should provide sufficient detail for understanding without external reference

  version:
    description: Version identifier for the entity.
    range: string
    comments:
      - Supports document control requirements per 7.5.3 e)
    examples:
      - value: "1.0"
      - value: "2.3.1"

  created_date:
    description: Date when the entity was created.
    range: date

  modified_date:
    description: Date when the entity was last modified.
    range: date

  # ---------------------
  # Document Control Slots (Clause 7.5)
  # ---------------------

  document_type:
    description: Classification of the documented information.
    range: DocumentType
    in_subset:
      - documented_information

  document_reference:
    description: Unique reference number for document control.
    range: string
    comments:
      - Per 7.5.2 a) identification and description
    examples:
      - value: "ISMS-POL-001"
      - value: "RA-2024-003"

  author:
    description: Person who created the document.
    range: string

  owner:
    description: Person accountable for the document content and maintenance.
    range: string

  approved_by:
    description: Person who approved the document.
    range: string
    comments:
      - Per 7.5.2 c) review and approval

  approved_date:
    description: Date when the document was approved.
    range: date

  effective_date:
    description: Date when the document becomes effective.
    range: date

  review_date:
    description: Date when the document is due for review.
    range: date

  status:
    description: Current status of the document or entity.
    range: string
    comments:
      - Examples include draft, approved, active, superseded, archived

  classification:
    description: Information classification level.
    range: string
    comments:
      - Per A.5.12, classification based on confidentiality, integrity, availability
    examples:
      - value: "confidential"
      - value: "internal"
      - value: "public"

  retention_period:
    description: Duration for which the document is retained.
    range: duration type
    comments:
      - Per 7.5.3 f) retention and disposition
      - Use ISO 8601 duration notation such as P1Y or P90D

  # ---------------------
  # Organization and Context Slots (Clause 4)
  # ---------------------

  organization:
    description: Reference to the organization operating the ISMS.
    range: Organization

  legal_name:
    description: Legal registered name of the organization.
    range: string

  trading_names:
    description: Names under which the organization conducts business.
    range: string
    multivalued: true

  organization_type:
    description: Type of organization (e.g., corporation, government, nonprofit).
    range: string

  industry_sector:
    description: Primary industry sector of the organization.
    range: string
    examples:
      - value: "Financial Services"
      - value: "Healthcare"
      - value: "Technology"

  size_category:
    description: Organization size classification.
    range: string
    examples:
      - value: "SME"
      - value: "Enterprise"

  employee_count:
    description: Approximate number of employees.
    range: positive integer type

  geographic_locations:
    description: Countries or regions where the organization operates.
    range: string
    multivalued: true

  regulatory_jurisdictions:
    description: Jurisdictions whose regulations apply to the organization.
    range: string
    multivalued: true

  parent_organization:
    description: Parent organization if applicable.
    range: string

  subsidiaries:
    description: Subsidiary organizations if applicable.
    range: string
    multivalued: true

  scope_statement:
    description: Documented statement of ISMS scope per 4.3.
    range: string
    comments:
      - Available as documented information
    annotations:
      iso27001_clause: "4.3"

  scope_boundaries:
    description: Defined boundaries of the ISMS scope.
    range: string
    multivalued: true

  scope_exclusions:
    description: Any exclusions from scope with justification.
    range: string
    multivalued: true

  context_internal_issues:
    description: Internal issues relevant to ISMS per 4.1.
    range: string
    multivalued: true

  context_external_issues:
    description: External issues relevant to ISMS per 4.1.
    range: string
    multivalued: true

  climate_change_relevant:
    description: >-
      Whether climate change has been determined to be a relevant issue for the
      organization's context, per Clause 4.1 as amended by Amd. 1:2024.
    range: boolean
    annotations:
      iso27001_clause: "4.1"
      iso27001_amendment: "Amd. 1:2024"
    comments:
      - Set true if climate change is identified as a relevant external or internal issue
      - When true, capture details in context_external_issues or context_internal_issues

  interested_parties:
    description: Stakeholders relevant to the ISMS.
    range: InterestedParty
    multivalued: true
    annotations:
      iso27001_clause: "4.2"

  party_type:
    description: Category of interested party.
    range: string
    examples:
      - value: "internal"
      - value: "external"
      - value: "regulatory"

  relationship:
    description: Nature of the relationship with the organization.
    range: string

  requirements:
    description: Requirements of the interested party.
    range: string
    multivalued: true
    comments:
      - May include legal, regulatory, and contractual requirements

  communication_needs:
    description: Communication requirements for this party.
    range: string

  contact_information:
    description: Contact details for the party.
    range: string

  # ---------------------
  # Policy Slots (Clause 5.2)
  # ---------------------

  information_security_policy:
    description: Reference to the information security policy.
    range: InformationSecurityPolicy
    annotations:
      iso27001_clause: "5.2"

  policy_statement:
    description: The core policy statement text.
    range: string

  policy_objectives_framework:
    description: Framework for setting information security objectives.
    range: string
    comments:
      - Per 5.2 b)

  commitment_statements:
    description: Statements of commitment included in the policy.
    range: string
    multivalued: true
    comments:
      - Includes commitment to satisfy requirements per 5.2 c)
      - Includes commitment to continual improvement per 5.2 d)

  applicability_statement:
    description: Statement of policy applicability.
    range: string

  communication_date:
    description: Date when the policy was communicated.
    range: date

  acknowledgment_required:
    description: Whether acknowledgment is required from personnel.
    range: boolean

  related_topic_policies:
    description: Topic-specific policies supporting this policy.
    range: TopicSpecificPolicy
    multivalued: true

  topic_area:
    description: The specific topic addressed by the policy.
    range: string
    examples:
      - value: "Access Control"
      - value: "Cryptography"
      - value: "Backup"

  parent_policy:
    description: The parent policy this topic-specific policy supports.
    range: InformationSecurityPolicy

  applicable_controls:
    description: Controls related to this policy.
    range: SecurityControl
    multivalued: true

  target_audience:
    description: Intended audience for the policy or document.
    range: string

  # ---------------------
  # Role Slots (Clause 5.3)
  # ---------------------

  roles:
    description: Information security roles defined in the ISMS.
    range: Role
    multivalued: true

  role_type:
    description: Category of the role.
    range: string
    examples:
      - value: "CISO"
      - value: "Risk Owner"
      - value: "Asset Owner"
      - value: "Auditor"

  responsibilities:
    description: Responsibilities assigned to the role.
    range: string
    multivalued: true

  authorities:
    description: Authorities granted to the role.
    range: string
    multivalued: true

  accountability:
    description: What the role is accountable for.
    range: string

  assigned_to:
    description: Person(s) assigned to this role.
    range: string
    multivalued: true

  delegation_rules:
    description: Rules for delegating responsibilities.
    range: string

  reporting_line:
    description: To whom this role reports.
    range: string

  # ---------------------
  # Objective Slots (Clause 6.2)
  # ---------------------

  objectives:
    description: Information security objectives.
    range: InformationSecurityObjective
    multivalued: true

  objective_statement:
    description: Clear statement of the objective.
    range: string

  target_value:
    description: Target value for the objective metric.
    range: string

  current_value:
    description: Current measured value.
    range: string

  metric_definition:
    description: Definition of how the objective is measured.
    range: string
    comments:
      - Per 6.2 b) objectives are measurable where practicable

  measurement_method:
    description: Method used to measure the metric.
    range: string

  measurement_frequency:
    description: How often measurement is performed.
    range: string

  responsible_role:
    description: Role responsible for the objective or control.
    range: Role

  target_date:
    description: Target date for achieving the objective.
    range: date

  achievement_status:
    description: Current status of objective achievement.
    range: string

  action_plan:
    description: Plan for achieving the objective.
    range: string
    comments:
      - Per 6.2 h-l) planning to achieve objectives

  # ---------------------
  # Risk Assessment Slots (Clause 6.1.2)
  # ---------------------

  risk_assessment_process:
    description: Reference to the risk assessment process.
    range: RiskAssessmentProcess

  risk_acceptance_criteria:
    description: Criteria for accepting risks.
    range: string
    annotations:
      iso27001_clause: "6.1.2 a) 1)"

  assessment_criteria:
    description: Criteria for performing risk assessments.
    range: string
    annotations:
      iso27001_clause: "6.1.2 a) 2)"

  assessment_methodology:
    description: Methodology used for risk assessment.
    range: string
    comments:
      - Supports consistent, valid, and comparable results per 6.1.2 b)

  likelihood_scale:
    description: Scale used for likelihood rating.
    range: string

  impact_scale:
    description: Scale used for impact rating.
    range: string

  risk_matrix:
    description: Risk matrix or calculation method.
    range: string

  assessment_frequency:
    description: Planned frequency of risk assessments.
    range: string

  trigger_events:
    description: Events that trigger risk assessment outside planned schedule.
    range: string
    multivalued: true
    comments:
      - Per 8.2, when significant changes are proposed or occur

  risk_assessments:
    description: Risk assessment instances.
    range: RiskAssessment
    multivalued: true

  assessment_scope:
    description: Scope of the assessment.
    range: string

  assessment_date:
    description: Date the assessment was conducted.
    range: date

  assessor:
    description: Person or team who conducted the assessment.
    range: string

  methodology_used:
    description: Specific methodology applied in this assessment.
    range: string

  risks_identified:
    description: Risks identified in this assessment.
    range: Risk
    multivalued: true

  summary_findings:
    description: Summary of assessment findings.
    range: string

  recommendations:
    description: Recommendations from the assessment.
    range: string
    multivalued: true

  next_assessment_date:
    description: Planned date for next assessment.
    range: date

  # ---------------------
  # Risk Slots
  # ---------------------

  related_risks:
    description: Associated risks.
    range: Risk
    multivalued: true

  risk_source:
    description: Source or origin of the risk.
    range: string

  threat_description:
    description: Description of the threat exploiting the vulnerability.
    range: string

  vulnerability_description:
    description: Description of the vulnerability that could be exploited.
    range: string

  affected_assets:
    description: Assets affected by this risk or incident.
    range: Asset
    multivalued: true

  affected_cia_properties:
    description: >-
      Which CIA properties are affected (confidentiality, integrity, availability).
    range: string
    multivalued: true
    comments:
      - Per 6.1.2 c) 1) risks associated with loss of CIA

  risk_owner:
    description: Person accountable for managing the risk.
    range: string
    annotations:
      iso27001_clause: "6.1.2 c) 2)"

  likelihood:
    description: Assessed likelihood of risk occurrence.
    range: LikelihoodRating
    annotations:
      iso27001_clause: "6.1.2 d) 2)"

  impact:
    description: Assessed impact if risk materializes.
    range: ImpactRating
    annotations:
      iso27001_clause: "6.1.2 d) 1)"

  inherent_risk_level:
    description: Risk level before controls are applied.
    range: RiskLevel

  existing_controls:
    description: Controls currently in place affecting this risk.
    range: SecurityControl
    multivalued: true

  residual_risk_level:
    description: Risk level after controls are applied.
    range: RiskLevel

  risk_treatment_option:
    description: Selected treatment option for the risk.
    range: RiskTreatmentOption

  treatment_priority:
    description: Priority for treating this risk.
    range: string

  related_treatment_plan:
    description: Risk treatment plan addressing this risk.
    range: RiskTreatmentPlan

  # ---------------------
  # Risk Treatment Slots (Clause 6.1.3)
  # ---------------------

  risk_treatment_process:
    description: Reference to the risk treatment process.
    range: RiskTreatmentProcess

  treatment_options_guidance:
    description: Guidance on selecting treatment options.
    range: string

  control_selection_criteria:
    description: Criteria for selecting controls.
    range: string

  soa_template:
    description: Template used for Statement of Applicability.
    range: string

  approval_workflow:
    description: Workflow for approving risk treatment.
    range: string

  risk_treatment_plans:
    description: Risk treatment plans.
    range: RiskTreatmentPlan
    multivalued: true

  plan_scope:
    description: Scope of the plan.
    range: string

  risks_addressed:
    description: Risks addressed by this plan.
    range: Risk
    multivalued: true

  treatment_actions:
    description: Actions to be taken for treatment.
    range: string
    multivalued: true

  controls_to_implement:
    description: Controls to be implemented as part of treatment.
    range: SecurityControl
    multivalued: true

  resources_required:
    description: Resources required for implementation.
    range: string

  responsible_parties:
    description: Parties responsible for implementation.
    range: string
    multivalued: true

  implementation_timeline:
    description: Timeline for implementation.
    range: string

  risk_owner_approval:
    description: Risk owner who approved the plan.
    range: string
    annotations:
      iso27001_clause: "6.1.3 f)"

  residual_risk_acceptance:
    description: Documentation of residual risk acceptance.
    range: string
    annotations:
      iso27001_clause: "6.1.3 f)"

  implementation_status:
    description: Current implementation status.
    range: ImplementationStatus

  completion_date:
    description: Date when implementation was completed.
    range: date

